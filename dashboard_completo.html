Monitor’s Office understands that performance evaluations are an effective way for PRP to emphasize and effectively institutionalize leadership, ethics, community policing, educational achievements, and constitutional policing in its officers. Promotions have taken place as well, as the previous paragraphs in this section have reported, which also promote these practices. The Monitor’s Office was able to review the exam questions, and PRP welcomed all recommendations. The Monitor’s Office previously reviewed and subsequently approved GO ...","path":"The Monitor’s Office is always willing to provide more information regarding Commander Corps. It should be noted that Benchmark Analytics or Axon may have a system for recording all additional trainings taken by officers, which are skillsets that make more qualified supervisors. It is the first step in the developmental career path for preparing supervisors. Police agencies across the nation have ..."}]},{"n":22,"id":"Paragraph 22: Use of Force - General Provisions","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"As in previous CMRs, the Monitor’s Office requested the following information: 1) number of incidents in which force was used and 2) how many officers used force in each incident. In response, PRP provided information attesting that force was used 1,150 times in 525 incidents during this reporting period. Of the 1,150 UOF incidents that occurred during this reporting period, the Monitor’s Office randomly sampled and reviewed 59 UOF reports. An analysis of the reports by the Monitor’s Office determined that the UOFs were in accordance with the rights, privileges, and immunities secured or protected by the Constitution or laws of the United States and the Commonwealth of Puerto Rico, which prohibit the use of unreasonable force. Further, during this reporting period, the Monitor’s Office rev...","path":"Now that PRP has, via its Provisional UOF Plan, provided reliable data relating to UOF numbers, the Monitor’s Office can thoroughly analyze a representative sample of the UOFs that occurred during the reporting period. However, PRP should endeavor to develop a permanent system to report accurate UOF incidents, one that is not labor intensive and does not require several layers of review as in the ..."}]},{"n":23,"id":"Paragraph 23: Use of Force - General Provisions","t":[{"num":1,"obj":"Policies incorporate all of the requirements of Paragraphs 22-24.","est":"Met","ass":"PRP has prepared comprehensive policies that categorize UOFs into multiple levels, grouped by degree of seriousness. The policies also describe each force level and the options available to officers as outlined in the Agreement and are consistent with generally accepted policing practices relating to UOF. The Monitor’s Office reviewed 59 UOF incidents during this reporting period and determined that the force used by officers was accurately categorized into levels grouped by the degree of seriousness. During this reporting period, there were 1,150 UOF applications; of these instances, 524 were level 1 (46%), were level 2 (21%), 320 were level 3 (28%), and 59 were level 4 (5%) UOFs.","path":null}]},{"n":24,"id":"Paragraph 24: Use of Force - General Provisions","t":[{"num":1,"obj":"Policies incorporate all of the requirements of Paragraphs 22-24.","est":"Met","ass":"PRP has prepared comprehensive policies and revised them periodically as outlined in the Agreement. The policies are consistent with generally accepted policing practices relating to UOF. During this reporting period, the Monitor’s Office reviewed and provided conditional approval, pending USDOJ approval, on GO 628 (Intervention with Persons in Crisis). The Monitor’s Office also reviewed forms and annexes associated with GO 628, GO 602 (Electronic Control Device) and GO 618 (Use and Handling of Firearm).","path":null}]},{"n":25,"id":"Paragraph 25: Use of Force - General Provisions","t":[{"num":1,"obj":"Policy prohibits use of CN ga  periods force was only used in instances where demonstrators or protesters were given lawful orders and failed to comply. Otherwise, demonstrators or protestors were allowed to assemble peacefully and lawfully. For this reporting period, DOT units were only mobilized in a stand-by or preventive patrol capacity in response to potential needs for...","path":"To achieve substantial compliance, PRP needs to continue to categorize all demonstrations and/or protests as planned or unplanned and ensure that all sworn members receive the eight-hour training on crowd control. The Monitor’s Office will continue to assess PRP’s progress and compliance with policy, crowd control resource deployment, and training through policy reviews and on-site observations."}]},{"n":35,"id":"Paragraph 35: Use of Force - Crowd Control and Incident Management","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"The Monitor’s Office reviewed numerous documents relating to mass demonstrations, including PPRs 625.3 (Report on Crowd Control and Management), PPR 625.2 (Operations Plan), and PPR 625.6 (Management and Control of Crowds). STUs prepare after-action reports if they actively participated in crowd control, which did not occur during this reporting period. The Monitor’s Office concludes that PRP’s actions during demonstrations and protests (planned and unplanned) in the reporting period were consistent with generally accepted policing practices and PRP policy. PRP provided the Monitor’s Office with Operation Plans (PPR 625.2) for the various demonstrations and protests that occurred in the reporting period, as well as Crowd Management and Control Reports (PPR 625.3), which provided basic deta...","path":"To achieve substantial compliance, PRP must continue to ensure that DOT supervisors and area commanders thoroughly assess all law enforcement activities following each response to a mass demonstration, civil disturbance, or other crowd control situation to ensure compliance w ry training. Doing so reiterates the value of such work in officer performance, encourages higher quality investigative work, and identifies ways in which investigators can seek to improve year to year.  6. SUPERVISORY AND FRB REVIEWS PRP has reached full or substantial compli..."}]},{"n":43,"id":"Paragraph 43: Use of Force - Supervisory and FRB Reviews","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Of the 59 UOF reports (PPR 605.1) reviewed by the Monitor’s Office during the reporting period, the Monitor’s Office found no instances in which a supervisor failed to respond to a serious UOF. The Monitor’s Office acknowledges PRP’s efforts towards addressing this issue with the Provisional UOF Plan.","path":null}]},{"n":44,"id":"Paragraph 44: Use of Force - Supervisory and FRB Reviews","t":[{"num":1,"obj":"Policies incorporate all of the requirements of the paragraph.","est":"Met","ass":"Policies incorporate all requirements of the Agreement. Training on force reviews and investigations for supervisors is also consistent with approved policies and 95% of supervisors are trained and certified. It should be noted that 2,244 out of 2,311 (97%) officers from the rank of sergeant to colonel have received REA 601, which includes the investigation and review of UOFs. Most PRP officers (96%) have completed the training. As it relates to supervisors serving on the area command FRBs, over 95% have received training to serve on the Board. In the 59 UOF reports (PPR 605.1) reviewed by the Monitor’s Office, in no instance did a supervisor fail to conform to what was required by policy, which was to complete their investigation of a UOF within business days. As it relates to area comman...","path":"As noted in other related paragraphs, compliance with this paragraph is largely contingent on PRP’s ability to accurately track all UOFs, ensuring that the Monitor’s Office’s review of UOFs is representative. The Monitor’s Office will continue to assess PRP’s complianc 1 negligent taser Accidental Discharge Investigations The Monitor’s Office conducted four site visits to FIU from April through September 2025. During the visits, seven accidental discharge files were reviewed. The following is a breakdown of the incide...","path":"PRP must ensure that FIU receives prompt notification in cases they will need to investigate. For the most part, this was the case. PRP must also ensure that FIU has adequate personnel to conduct its investigations and that all personnel have completed all necessary training to meet timelines relating to investigating serious UOFs. FIU has limited personnel to respond and investigate serious force..."}]},{"n":50,"id":"Paragraph 50: Use of Force - FIU Investigations and Force Reviews by SFRB","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"In all cases where FIU determined that the UOF may involve criminal conduct by an officer, PRDOJ was notified along with its investigative arm, NIE. The Monitor’s Office confirmed through a review of FIU data that there were no referrals during this reporting period.","path":null}]},{"n":51,"id":"Paragraph 51: Use of Force - FIU Investigations and Force Reviews by SFRB","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"PRP reported that FIU opened 61 UOF investigations during the reporting period, and of those cases, all that were required to be closed in 60 calendar days were closed. The Monitor’s Office can assess that FIU is currently in compliance with this paragraph; however, it should be noted PRP must continue this effort moving forward. In January 2024, the Parties met with the Monitor’s Office to discuss the timeline discrepancy. During the meeting it was agreed upon by the Parties that the 45-day timeline would be amended to 60 days. Subsequently the Parties have agreed to the modification and the methodology changed to reflect same. In further discussions with FIU, investigators noted that in the past the root cause for failing to complete the investigation in the allotted time was delays in r...","path":"PRP should ensure that all FIU investigations are completed in 60 days, as agreed upon by the Parties and that FIU has adequate staff and resources to complete these investigations."}]},{"n":52,"id":"Paragraph 52: Use of Force - FIU Investigations and Force Reviews by SFRB","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"CFRB members have been trained on GO 502 (Force Review Board). The Monitor’s Office was informed and provided documentation that the curriculum for training was developed and the training commenced in March 2024. The Monitor’s Office requested the training certification records of the four CFRB members, as well as any other person who may have served on the CFRB during the reporting period to determine whether CFRB members are qualified to serve on the Board as outlined in GO (Evaluation Boards of UOF Incidents). PRP provided the Monitor’s Office with personnel documentation verifying that the four members of the CFRB were trained. PRP provided the Monitor’s Office with documentation that FIU opened 61 investigations during the reporting period, and 107 cases were forwarded to CFRB for eva...","path":"Previous issues with the timeliness of these evaluations appear to be resolved. It is imperative that PRP and CFRB members commit to completing these evaluations in the timelines established in policy. PRP should also ensure that all officers serving on the CFRB have training certifications. The Monitor’s Office will continue to review the training curriculum developed, and the training provided. ..."}]},{"n":53,"id":"Paragraph 53: Use of Force - Use of Force Training","t":[{"num":1,"obj":"Training on use of force is consistent with approved policies and the requirements of the paragraph.","est":"Met","ass":"PRP recently updated all UOF policies and, as a result, developed new UOF training curriculums on these policies. The Monitor’s Office’s previous rev 4 of 69 arrests, for a 93% compliance rate. PRP monitors officer engagement with the PC video through the Info Access modu...","path":"Strict adherence to training schedule and accountability will help PRP improve and maintain compliance with this paragraph. PRP must also provide further documentary evidence that the Bureau is seeking input to address community needs when it conducts operations to impact criminal activity or quality of life issues in neighborhoods. Documentary evidence can include, among others, copies of notes o..."}]},{"n":59,"id":"Paragraph 59: Searches and Seizures - General Provisions","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"PRP policies regarding search, seizure, and arrests are undergoing biennial revision and await the implementation of the Search and Seizure Implementation Plan. The current policies address legal and procedural aspects related to arrests, detentions, and searches. In-service training on these policies was completed by all officers in 2024, and targets have been set for completion of the 2025 in-service training. This training included an instructional video on properly articulating probable cause, which was reviewed by the Monitor’s Office and determined to be effective. Consequently, PRP officers have demonstrated significant progress in articulating PC within their reports. Analysis of the data indicates that 64 out of 69 eligible arrest reports (93%) accurately documented probable cause...","path":"Regular and on-time policy review, training, and implementation are necessary for compliance. PRP has fallen behind on timely policy review and implementation – see the Policies and Procedures section for additional information. PRP conducted in-service training for all officers during 2024 and is scheduled to complete its 2025 in-service training by March 2026, meaning that PRP is not currently i..."}]},{"n":60,"id":"Paragraph 60: Searches and Seizures - Investigatory Stops and Searches","t":[{"num":1,"obj":"100% of stops and searches are justified based on probable cause. For stops and searches based on a lesser standard or that are otherwise unjustified, PRPB takes corrective and/or disciplinary action.","est":"No Detectado","ass":"GO 612 (Searches and Seizures) addresses investigatory stops in general terms (traffic stops based on probable cause).3 It also addresses the issue of collecting and tracking investigatory stop data, as required by the Agreement.4 PRP conducts traffic stops based on PC, but presently only records those resulting in arrest or citation. Automated tracking modules are in development to record and analyze pertinent demographic and geographic data on all stops with a pilot phase beginning in July 2025, as reported by PRP. Among the randomly selected arrest files, 14 arrests were a result of traffic stops conducted by PRP Highway Patrol Units. All 14 files documented clear PC. While documentation of PC during investigatory stops has been noted, this paragraph will remain deferred until systems a...","path":"This paragraph is deferred until dashboards and scorecards for tracking investigatory stops, including traffic stops leading to arrests or citations, are fully implemented per Paragraph 243 of the Agreement. This ensures that the data can be validated to ensure reliability. A public report must also be submitted to the Monitor’s Office for review. Deferral continues until these requirements are me..."},{"num":2,"obj":"100% of stops and searches reviewed as part of other areas of the Agreement are based on probable cause. For stops and searches based on a lesser standard or that otherwise unjustified, PRPB takes cor...","est":"No Detectado","ass":"GO 612 (Searches and Seizures) addresses investigatory stops in general terms (traffic stops based on probable cause).3 It also addresses the issue of collecting and tracking investigatory stop data, as required by the Agreement.4 PRP conducts traffic stops based on PC, but presently only records those resulting in arrest or citation. Automated tracking modules are in development to record and analyze pertinent demographic and geographic data on all stops with a pilot phase beginning in July 2025, as reported by PRP. Among the randomly selected arrest files, 14 arrests were a result of traffic stops conducted by PRP Highway Patrol Units. All 14 files documented clear PC. While documentation of PC during investigatory stops has been noted, this paragraph will remain deferred until systems a...","path":"This paragraph is deferred until dashboards and scorecards for tracking investigatory stops, including traffic stops leading to arrests or citations, are fully implemented per Paragraph 243 of the Agreement. This ensures that the data can be validated to ensure reliability. A public report must also be submitted to the Monitor’s Office for review. Deferral continues until these requirements are me..."}]},{"n":61,"id":"Paragraph 61: Searches and Seizures - Investigatory Stops and Searches","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"PRP officers are prohibited from using boilerplate or false information per GO 615 (Arrests and Citations). In 93% of arrest cases (64 of 69), officers clearly stated PC, avoiding boilerplate, repetitive, or conclusory language. Recent re-training, including a video on PC, has helped improve this. This section is deferred until PRP fully implements automated systems to monitor investigatory stops and searches.","path":"Although GO 615 provides thorough guidance for officers during arrest situations, this paragraph remains deferred for assessment with Paragraph 60 until PRP fully implements proper dashboards and graphical scorecards for collecting, tracking, and analyzing all investigatory stops and searches."}]},{"n":62,"id":"Paragraph 62: Searches and Seizures - Investigatory Stops and Searches","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"All investigatory stops and searches by PRP officers must be based on PC per policy. GO 615 (Arrests and Citations) requires that all investigative stops whether resulting in an arrest or citation be based on PC and the Agreement requires that all such stops be documented and collected with specific demographic and geographic data for proper analysis and reporting. PRP has created but not yet fully implemented the necessary automated systems to address this issue. There were 14 random samples of investigatory stops (traffic stops) and searches conducted by officers and analyzed by the Monitor’s Office for this reporting period. All 14 showed that officers properly established PC prior to arrest and were reviewed by supervisors, who concluded that no corrective action was warranted in any i...","path":"The full implementation of systems to document and analyze investigatory stops and searches, including traffic stops that do not result in arrest or citation, will undoubtedly help PRP improve compliance. Supervisors are expected to monitor situations where officers may lackPC for an arrest and provide guidance or corrective action as necessary."}]},{"n":63,"id":"Paragraph 63: Searches and Seizures - Investigatory Stops and Searches","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Command-level officers reviewed all 14 eligible investigative stops in the randomly selected arrest and search files. Seven reviews met the 3-day deadline, while 7 were late or not done at all.5 No violations were reported by commanders. 5 See complaint #’s 2025:1-199:002437 and 2025:4-199:000577. At present, only stops resulting in arrests are documented, which does not allow command-level officers to assess stops that do not lead to arrests or citations. PRP has established systems intended to record all investigative stops; however, these systems are not yet fully in place. Therefore, this paragraph will remain deferred until further implementation.","path":"Supervisors and commanders must review all stop and detention reports in a timely manner, including traffic stops resulting in arrest, no arrest, or citation. Key demographic and geographic data must be collected for analysis to comply with Paragraph 243 of the Agreement's Outcome Assessments."}]},{"n":64,"id":"Paragraph 64: Searches and Seizures - Investigatory Stops and Searches","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Paragraph 243 of the Agreement requires that all investigative stops and searches be tracked, recorded, reviewed, and analyzed. Graphical dashboards and scorecards for the collection and analysis of this data have been created but not fully implemented. For this reason, this paragraph will remain deferred.","path":"PRP will improve compliance in this section once full implementation of automated systems are in place enabling the required data collection and analysis of all investigative stops per this paragraph and Paragraph 243, and the data is validated by the Monitor’s Office. Additionally, a timely, published findings report is required for compliance.  3. ARRESTS Most officers now prepare accurate arres..."}]},{"n":65,"id":"Paragraph 65: Searches and Seizures - Arrests","t":[{"num":1,"obj":"Policies and forms incorporate all of the requirements of Paragraphs 59, 65-71.","est":"Met","ass":"GO 615 (Arrests and Citations) conforms to generally accepted policing practices and complies with the Agreement. This policy was last revised and approved in October 2022 and is in the review process as of this CMR, pending the implementation of PRP’s Search and Seizure Implementation Plan. The Monitor’s Office reviewed 96 eligible arrest and search files for supervisory and unit commander review form PPR 615.8. Of these, 84 (88%) passed supervisory and unit commander review and 12 did not due to poor review (e.g. #2025-13-022-00181 and #2025-06-400-000216) or no review at all (some were missing several forms, see #2025-11-17-000921, #2025-3-199-000853E, or #2025-01-38-002923). The complianc  forms, see #2025-11-17-000921, #2025-3-199-000853E, or #2025-01-38-002923). The compliance rate of 88% is below the required 95% threshold. As of the introduction of the new GTE module in ...","path":"PRP must ensure arrest files include completed booking sheets (PPR 631.1) and that supervisors check and document any arrestee injuries. Supervisors and commanders must address cases where PC for arrest is lacking. Officers and dispatchers should record mileage to and from police facilities as required on the Complaint Card (PPR 126.2)."}]},{"n":66,"id":"Paragraph 66: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Supervisors documented their responses to arrest scenes on forms PPR 615.8 or PPR 621.1, either in person, by phone, or via radio. Of 78 eligible arrest and search cases, supervisors responded in instances (97%). They also responded to 14 of 16 resisting arrest/obstruction of justice cases (88%), with only 2 handled by radio and the rest in person. Supervisors responded 97% of the time overall, above the 95% required. However, per the Agreement, supervisors must respond to all cases involving an arrest for resisting and/or obstruction of justice. As this paragraph is evaluated in conjunction with Paragraph 65, its status will continue to be classified as partially compliant.","path":"PRP is responsible for ensuring that both dispatchers and officers comply with established policy and appropriately complete PPR 126.2 (Complaint Card) whenever a supervisor is notified of an arrest. Additionally, to support the Monitor’s Office in assessing compliance, officers must indicate whether the charged offense constitutes a felony or misdemeanor. The Agreement requires supervisors to res..."}]},{"n":67,"id":"Paragraph 67: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Currently, PRP does not have a method to track officers' travel when transporting arrestees. Additionally, in a review of 114 eligible arrest and search files, mileage reporting was omitted in 54 cases, indicating a 47% rate of non-compliance. However, it was evident that the recently updated GTE module had an obvious impact, as the rate of mileage reporting was higher for those arrests and searches occurring after June 2025 when the GTE module was updated. Mileage reporting is expected to vastly improve for the next reporting period. The Monitor’s Office has noticed that often officers are not completing all required arrest forms by the end of their shift as required by the Agreement.6 Also, 30 arrest and search files were missing at least one form, most commonly PPR 636.1 (Property/Evide...","path":"As of June 2025, PRP has implemented a new updated GTE module to improve the recording of mileage during transportation of arrestees to police facilities. The module is intended to help PRP meet compliance requirements. Dispatchers are required to collect and record this information on PPR 126.2 (Complaint Card) according to policy and the Agreement. However, there were still some forms indicating..."}]},{"n":68,"id":"Paragraph 68: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Upon arrival at police facilities, PRP policy and the Agreement stipulate that supervisors are responsible for inspecting arrestees for any injuries and ensuring medical assistance is provided as necessary. All relevant information must be documented on the PRP booking sheet, PPR 631.1 (Arrested Person Report). An analysis showed that in 86 of 97 eligible arrest and search cases, supervisors adhered to proper inspection protocols, yielding a compliance rate of 89%, which falls short of the mandated 95% threshold. Among the eleven non-compliant cases, some were missing booking sheets (complaint #s 2025-3-199-000853E and 2025-01-382-002923), while others contained booking sheets without documentation regarding the condition of the arrestee (#s 2025-7-299-001079 and 2025-8-199-001678).","path":"As required by this paragraph, for compliance to move forward PRP supervisors must complete the Booking Sheet PPR 631.1 (Arrested Persons Report) for every arrest, inspect arrestees for injuries, and provide medical assistance when needed."}]},{"n":69,"id":"Paragraph 69: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"GO 615 (Arrests and Citations) requires supervisors to personally review and approve warrantless arrests on PPR 615.8. Supervisors documented their response to arrest scenes on forms PPR 615.8 or PPR 621.1, either in person, by phone, or via radio. Of 65 eligible arrest cases reviewed, supervisors reviewed 64 (98%) with 1 case having no review (2025- 4-049-000780). However, 3 of the 64 reviews (5%) were rated poor due to missing pages (2025-4-199- 000577 or, poor documentation of PC (2025-06-400-000353). They also responded to and reviewed of 16 resisting arrest/obstruction of justice cases (88%), with only 2 handled by radio and the rest in person. Supervisors responded 97% of the time overall, above the 95% threshold required. However, per the Agreement, supervisors must respond to and r...","path":"To maintain satisfactory compliance levels, supervisors must continue to review all booking recommendations within the 12-hour period required by this paragraph and ensure that all eligible arrests are properly reviewed and documented. PRP must also ensure that districts and units add the time and date of arrest under column F designated for “FECHA DD-MM-AA” of incident on the sampling spreadsheet..."}]},{"n":70,"id":"Paragraph 70: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"Of 69 eligible arrest reports, 64 (93%) clearly documented PC; 2 lacked sufficient documentation .8 The Monitor’s Office also rated supervisory reviews for the latter two cases as poor. The supervisors on these cases did not take any apparent corrective action to address these deficiencies. According to GO 310 (Performance Evaluations) supervisors are required to evaluate the “…quality of elements to establish PC…” The GO also establishes the grade-point score for each category as follows: Excellent - 4 points; Passing - 3 points; Needs Improvement - 2 points; Fail - 1 point; and N/A for Not Applicable. PRP submitted a large number of officer performance evaluations for all ranks for this reporting period. However, the Monitor’s Office had no way to link the names on that list with the sup...","path":"PRP supervisors are ensuring compliance by reviewing at least 95% of selected arrests. However, no apparent corrective action is being taken when officers document insufficient PC on arrest reports. As 8 See #s 2025-13-022-001851 and 2025-06-400-000216. required by Paragraph 69, PRP must also ensure that all warrantless arrests are thoroughly reviewed and that all relevant arrest forms are complet..."}]},{"n":71,"id":"Paragraph 71: Searches and Seizures - Arrests","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"A total of 90 randomly selected arrest and search files were subject to commanders’ review under PPR 615.8 during this reporting period. Of these, 25 reviews (28%) did not meet the required 7-day review period, while 61 (68%) were completed within the designated timeframe. In four cases (4%) commanders failed to submit a review. Supervisors and commanders identified no instances of serious or criminal misconduct in these cases.","path":"PRP commanders regularly review arrest reports, maintaining compliance rates above 95%. However, a stronger effort is needed to ensure evaluations of arrests are completed on time, as many have exceeded the seven-day limit set by the Agreement and in some cases no reviews were submitted."}]},{"n":72,"id":"Paragraph 72: Searches and Seizures - Arrests","t":[{"num":1,"obj":"Policies incorporate all of the requirements of Paragraphs 59 and ate documentation for incriminating evidence and returnable property. The Mon..."}]},{"n":73,"id":"Paragraph 73: Searches and Seizures – Arrests","t":[{"num":1,"obj":"Interagency agreements and policies incorporate the requirements of the paragraph.","est":"Met","ass":"The Reform Office submitted an updated Feedback Committee Protocol to the Monitor’s Office. This revised Protocol now contains provisions to invite representatives from the Public Defenders’ Office to participate in Committee meetings. The Protocol remains fully compliant with the terms of the Agreement. During this reporting period, the Monitor’s Office interviewed committee members from the following police areas: Fajardo, Ponce, Guayama, Aibonito, Carolina, and Arecibo. These committees submitted evidence of their meetings, such as agendas, attendance sheets, and minutes. The remaining police areas (Humacao, Aguadilla, Bayamon, Caguas, Mayaguez, San Juan, and Utuado) plus the Central Committee submitted documents related to their Feedback Committee meetings for the current reporting per...","path":null},{"num":2,"obj":"PRPB officers seek and obtain feedback from criminal justice agencies and entities as required by approved agreements and policies.","est":"Met","ass":"The Reform Office submitted an updated Feedback Committee Protocol to the Monitor’s Office. This revised Protocol now contains provisions to invite representatives from the Public Defenders’ Office to participate in Committee meetings. The Protocol remains fully compliant with the terms of the Agreement. During this reporting period, the Monitor’s Office interviewed committee members from the following police areas: Fajardo, Ponce, Guayama, Aibonito, Carolina, and Arecibo. These committees submitted evidence of their meetings, such as agendas, attendance sheets, and minutes. The remaining police areas (Humacao, Aguadilla, Bayamon, Caguas, Mayaguez, San Juan, and Utuado) plus the Central Committee submitted documents related to their Feedback Committee meetings for the current reporting per...","path":null},{"num":3,"obj":"100% of alleged misconduct noted in protocol documentation corresponds with a SARP investigation.","est":"Met","ass":"The Reform Office submitted an updated Feedback Committee Protocol to the Monitor’s Office. This revised Protocol now contains provisions to invite representatives from the Public Defenders’ Office to participate in Committee meetings. The Protocol remains fully compliant with the terms of the Agreement. During this reporting period, the Monitor’s Office interviewed committee members from the following police areas: Fajardo, Ponce, Guayama, Aibonito, Carolina, and Arecibo. These committees submitted evidence of their meetings, such as agendas, attendance sheets, and minutes. The remaining police areas (Humacao, Aguadilla, Bayamon, Caguas, Mayaguez, San Juan, and Utuado) plus the Central Committee submitted documents related to their Feedback Committee meetings for the current reporting per...","path":null}]},{"n":74,"id":"Paragraph 74: Searches and Seizures - Searches","t":[{"num":1,"obj":"Polices and forms incorporate all of the requirements of Paragraphs 59, 74-77.","est":"Met","ass":"The current Search and Seizure policy (GO 612, revised March 2022) follows accepted policing standards and relevant laws. It defines terms, outlines search procedures with or without warrants, and provides instructions for securing and managing seized property and evidence. The policy is on hold until the Searches and Seizures Implementation Plan is enacted. In the randomly selected sample of 64 eligible searches (both warrant-based and consent), the Monitor’s Office evaluated 54 as substantially compliant, resulting in an 84% overall compliance rate, short of the required 95% threshold. Five searches were rated partially compliant due to various issues. An additional five searches were rated non-compliant for missing multiple forms, including the police report, booking sheet, co aff interventions with the individuals involved. Each complaint was assigned a SARP case number, confirming that all 23 cases were formally investigated by SARP. PRP followed its policy of initiating an administrative investigation whenever a criminal case involving one of its members was identified. In each case, PRP adhered to established procedures by confiscating the officers involved weapons and ammunition. This was documented through PPRs 618.2 (Authorized Weapons Receipt), 618.3 (R...","path":null}]},{"n":100,"id":"Paragraph 100: Equal Protection and Non-Discrimination - Sexual Assault and Domestic","t":[{"num":1,"obj":"PRPB is tracking dispositions of sexual assault investigations based on the requirements of the Paragraph.","est":"Met","ass":"During this reporting period, PRP continued to advance its reporting capabilities. A key component for Paragraph 100 implementation is making DV data available in the Annual Report. PRP is in the process of establishing reporting parameters that will capture this information. The implementation of the EIS DV Module supports the creation of a comprehensive system report that includes a) the status of all DV investigations, regardless of when the initial incident occurred or when the investigation began during the reporting period, and b) the outcomes of all complete investigations. The DV Status Report for the period of October 1, 2024, to March 30, 2025, reflects a total of 2,638 cases. The report categorizes incidents by region and disposition, providing a systematic and organized approac...","path":"PRP should prioritize finalizing and publishing the 2024 Annual Report to provide the official data required under Paragraph 100. This includes tracking the dispositions of DV investigations, arrests, prosecutorial charging decisions, convictions, gender-specific arrest data, and incidents involving multiple arrestees. Until the Annual Report is approved and published, PRP cannot demonstrate compl..."},{"num":2,"obj":"PRPB is reporting the sexual assault disposition data in its annual report.","est":"Missed","ass":"During this reporting period, PRP continued to advance its reporting capabilities. A key component for Paragraph 100 implementation is making DV data available in the Annual Report. PRP is in the process of establishing reporting parameters that will capture this information. The implementation of the EIS DV Module supports the creation of a comprehensive system report that includes a) the status of all DV investigations, regardless of when the initial incident occurred or when the investigation began during the reporting period, and b) the outcomes of all complete investigations. The DV Status Report for the period of October 1, 2024, to March 30, 2025, reflects a total of 2,638 cases. The report categorizes incidents by region and disposition, providing a systematic and organized approac...","path":"PRP should prioritize finalizing and publishing the 2024 Annual Report to provide the official data required under Paragraph 100. This includes tracking the dispositions of DV investigations, arrests, prosecutorial charging decisions, convictions, gender-specific arrest data, and incidents involving multiple arrestees. Until the Annual Report is approved and published, PRP cannot demonstrate compl..."}]},{"n":109,"id":"Paragraph 109: Policies and Procedures – General Provisions","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"PRP has consistently demonstrated efficiency in developing new policies, as well as reviewing and updating existing policies, forms, guides, and manuals. Its policies define terms clearly and comply with applicable law and generally accepted policing practices. Twenty-one PRP policies were eligible for review during the reporting period according to the September 2024 PRP Policy Calendar. Only three (GO 600-642, 600-628 and 100-119) were submitted for review to the Monitor’s Office, which were deemed compliant and approved. Further, PRP provided in-service training to 100% of officers during the reporting period, surpassing the 95% compliance threshold. In a review of arrest and search data the Monitor’s Office found that PRP officers continue to improve significantly in the preparation of...","path":"PRP is responsible for ensuring effective implementation of all policies and enhancing its capacity to verify policy compliance in operational settings, as evidenced by outcome assessments conducted pursuant to Paragraph 243. PRP has fallen behind in timely policy review and approval. Additionally, PRP should maintain its practice of using area command monthly training sessions and its virtual tra..."}]},{"n":110,"id":"Paragraph 110: Policies and Procedures - General Provisions","t":[{"num":1,"obj":"The Policy and Procedures Manual is complete, organized, and indexed, as required by the Agreement.","est":"Met","ass":"PRP’s Virtual Library (GO 409), available since late 2021 on the PRP website, provides officers and the public with searchable access to all approved policies, forms, guides, and manuals via computer or smartphone.14 The Virtual Library serves as the official Policies and Procedures Manual. The Monitor’s Office recently confirmed its proper functioning by accessing it on PRP’s website and conducting random searches.","path":null},{"num":2,"obj":"The current Policy and Procedures Manual is accessible to officers in 95% of selected precincts and units.","est":"Met","ass":"PRP’s Virtual Library (GO 409), available since late 2021 on the PRP website, provides officers and the public with searchable access to all approved policies, forms, guides, and manuals via computer or smartphone.14 The Virtual Library serves as the official Policies and Procedures Manual. The Monitor’s Office recently confirmed its proper functioning by accessing it on PRP’s website and conducting random searches.","path":null}]},{"n":111,"id":"Paragraph 111: Policies and Procedures - General Provisions","t":[{"num":1, leaving a direct contradiction between officers concerning a material fact.54 In the case of those officers whose memory allegedly fails when asked a direct question regarding their observations of another officers’ alleged misconduct, the SARP ..."}]},{"n":182,"id":"Paragraph 182: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"Compelled statements are taken in accordance with approved policies and officers’ constitutional rights. Note: Policies and trainings are assessed as part of Paragraph 177.","est":"No Detectado","ass":"PRP submitted an acceptable Garrity warning to the Monitor’s Office two years ago, which the Monitor’s Office reviewed, edited, and approved for use. In previous CMRs, the Monitor’s Office saw evidence of misunderstanding of the Garrity Rule and how it must be applied. In this reporting period, there were no cases involving Garrity in the sample requested. Garrity may be used to elicit a statement only in an administrative interview, and not in an interview conducted by criminal investigators - especially those from Internal Affairs, who must be strictly shielded from exposure to Garrity-supplied information. These misuses of Garrity were observed when criminal internal investigators were improperly assigned administrative investigations to complete despite the Monitor’s Office’s strident ...","path":"There were no cases found in the sample where Garrity was used. In March 2025, the Monitor’s Office prepared a brief course on the proper use of Garrity and made a presentation to the entire SARP command staff. There seems to be no lingering doubt among SARP 55 Many articles of evidence, including photographs, drawings, videos, official records, non-Garrity statements, ballistics evidence, etc., m..."}]},{"n":183,"id":"Paragraph 183: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"Subject officers are not given Miranda warnings where there is no potential for criminal investigation or prosecution. Note: Policies and trainings are assessed as part of Paragraph 177.","est":"Met","ass":"For the entire compliance monitoring phase, the Monitor’s Office continues to search for but has yet to uncover a single instance of a PRP member being Mirandized where no possible criminal jeopardy could have arisen from the facts as alleged.","path":null}]},{"n":184,"id":"Paragraph 184: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"The samples provided to the Monitor’s Office show no evidence that internal cases of a criminal dimension are being assigned and investigated criminally and administratively by different investigators concurrently within five business days. PRP continues to admit that it fails to do so after six years of monitoring. Since September 2024, the Monitor’s Office has been told by the Civilian Complaints, Internal Investigations, and Discipline Working Group that a new policy of simultaneous internal investigations has been written. The Monitor’s Office has yet to see a draft of the new policy. PRP continues to indicate that the policy is awaiting signature by the Superintendent.","path":"Internal criminal and administrative investigations must be assigned for concurrent investigation by separate corresponding branches of SARP - NAI and NIA. Internal Affairs (NAI) investigators should not conduct administrative investigations of any kind; much less be assigned to re-investigate their own criminal cases from an administrative perspective. Continuance of this unacceptable practice ef..."}]},{"n":185,"id":"Paragraph 185: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"Administrative and criminal investigations are conducted separately as required by approved policies after a subject officer has provided a compelled statement. Note: Policies and trainings are assess...","est":"Missed","ass":"The Monitor’s Office’s partial compliance finding is based upon continued lack of agreed-upon policies and procedures implementation. Only an administrative investigator may use Garrity. Once that Garrity statement has been taken, it may not be shared with criminal investigators or prosecutors, specifically including Internal Affairs.","path":"So long as PRP continues assigning administrative investigations to Internal Affairs investigators, or misusing Garrity, PRP will not progress beyond partial compliance with Paragraph 185."}]},{"n":186,"id":"Paragraph 186: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"95% of sampled investigations considered all relevant evidence in a manner consistent with this Paragraph, and tried to resolve material inconsistencies between witness statements. Note: Policies and ...","est":"Missed","ass":"In the past, the Monitor’s Office had seen relatively few instances where circumstantial evidence (especially prior remarkably similar allegations of misconduct on file with PRP), was considered by SARP investigators in their investigations. In a positive development, the Monitor’s Office has detected a change with the inclusion of an analysis of the officer’s prior complaint history in a limited number of recently concluded files. While current case files show that this approach is far from universal, it indicates that SARP is on the right path. Future cases must contain a short study of the accused employee’s history of accusations and discipline (historial) in all relevant SARP inquiries regardless of whether the case was sustained or not. In all cases, details of alleged similar miscon...","path":"The Commonwealth must consider all relevant evidence, including circumstantial, direct, and physical evidence when conducting its investigations. PRP must continue and expand upon the practice of citing the employee’s record of accused misconduct and discipline in their case reports. PRP must continue to make efforts to resolve material inconsistencies between conflicting sworn witness statements ..."}]},{"n":187,"id":"Paragraph 187: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"95% of sampled investigations were not closed simply because the complaint is withdrawn or the alleged victim is unwilling or unable to provide additional information beyond the initial complaint, or ...","est":"Met","ass":"The Monitor’s Office has yet to observe a SARP case that had been closed because a complaint was withdrawn, the alleged victim failed to cooperate, or the complainant was found guilty of any offense. The data reviewed during this reporting period contained cases that were sufficiently investigated after the complainant withdrew or expressed disinterest with continuing an investigation.","path":null}]},{"n":188,"id":"Paragraph 188: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"Misconduct investigators identify and recommend one of the listed dispositions for each allegation of misconduct in an administrative investigation. Note: Policies and trainings are assessed as part o...","est":"Missed","ass":"The Monitor’s Office has seen several cases in this reporting period where an investigator’s incongruous finding was left in place by a supervisor or higher authority. The most common example is a confusion between a not sustained and exonerated finding, though there are other aberrations as well.57,58 Of the cases sent to the Monitor’s Office for review, 14% contained an incongruous finding. All must understand that the findings of exoneration apply only when the preponderance of evidence reveals that the conduct did occur, and that the conduct was proper in accordance with law, PRP rules, policies, and procedures. If the evidence casts substantial doubt on whether the alleged incident actually occurred, only then would a finding of unfounded be indicated.","path":"The Monitor’s Office urges SARP to continue to clarify the difference between its four factual case findings among all staff during all scheduled training events. SARP supervisors and area commanders are an essential tool to prevent these erroneously decided cases from advancing within the system. SARP supervisors and area commanders must be subjected to discipline, including non-punitive discipli..."}]},{"n":189,"id":"Paragraph 189: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":1,"obj":"The unit commanders complied with the requirements of this Paragraph in 95% of selected investigations. Note: Policies and trainings are assessed as part of Paragraph 177.","est":"Missed","ass":"For a discussion on SARP supervision and area command reviews, please refer to Paragraph 188. Of the cases sent to the Monitor’s Office for review, 14% contained an incongruous finding, which was later improperly approved by superior officers at multiple levels of PRP.","path":"The Monitor’s Office recommends that each case be properly reviewed at the area level to ensure that it contains a properly supported, dated, and signed review/approval from the SARP area supervisor as well as SARP command. All review certifications found in a SARP file must contain the name of the supervisor, the date of execution, and an original signature. SARP supervisors and area commanders m..."}]},{"n":190,"id":"Paragraph 190: Civilian Complaints, Internal Investigations, and Discipline - Investigation of","t":[{"num":null,"obj":null,"est":"Sin targets detectados","ass":"In September 2025, the Monitor’s Office met with Lt. Colonel Diana Crispin who is currently assigned as the Administrative Associate Superintendent to Superintendent Joseph Gonzalez. She is the Superintendent’s designee to review and handle SARP cases for their final resolution process in accordance with Puerto Rico Organic Law. The Colonel opriately protect sensitive data.","est":"No Detectado","ass":"This is unchanged from CMR-12. As noted, the central commands are relied on heavily for access to NCIC information. Officers that need NCIC information must relay their requests to the central commands.","path":"This is unchanged from CMR-12. Unless the criteria for success under this paragraph is changed, PRP must continue integrating and implementing NCIC to ensure roll out beyond headquarters and area central commands. Availability to all authorized and trained officers must be achieved and be aligned with NCIC operational use criteria."}]},{"n":224,"id":"Paragraph 224: Information Systems and Technology","t":[{"num":1,"obj":"Full enumeration: Used for sources that must be reviewed exhaustively, such as revisions to policies and training curricula, exemplars of forms that PRP uses to interact with the public, and records f...","est":"No Detectado","ass":"As noted in previous CMRs, PRP has adopted the allowances of this paragraph. Appendix A: Background to PRP Monitoring Mission In 2008, USDOJ initiated an investigation of PRP into an alleged pattern or practice of using excessive force, conducting unlawful searches and seizures, and unlawful discrimination, all of which are proscribed by the United States Constitution. USDOJ conducted their investigation pursuant to the Violent Crime Control and Law Enforcement Act of 1994, 42 U.S.C. § 14141, and the anti-discrimination provisions of the Omnibus Crime Control and Safe Streets Act, 42 U.S.C. § 3789d. PRP accepted the grounds for the investigation and pledged cooperation and has worked in partnership with USDOJ to establish the reforms outlined in this Agreement. As part of its investigation...","path":null}]}],"h":[{"id":"RS-P038-001","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"No se identificó en la Orden General 605 vigente el requisito de, requerir que los agentes soliciten servicios médicos de inmediato cuando un individuo resulte lesionado o se queje de estar lesionado después de un incidente de uso de fuerza.  Por otro lado, se identificó los siguientes hallazgos:  • La Orden General hace referencia a la PPR 605.4; sin embargo, dicho documento no fue localizado ni en la Biblioteca Virtual ni en el inventario de la Unidad de Políticas y Procedimientos.","req":"La política de la PPR requerirá que los miembros de la fuerza policiaca soliciten servicios médicos de inmediato cuando un individuo resulte lesionado o se queje de estar lesionado después de un incidente de uso de fuerza."},{"id":"RS-P038-002","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"No existe evidencia de que el sistema de información tanto en el GTE como así también en el módulo de Uso de Fuerza capture los datos relacionados con la solicitud de servicios médicos inmediatos cuando un individuo resulta lesionado o manifiesta estar lesionado tras un incidente de uso de fuerza. Esta limitación impide verificar la trazabilidad y consistencia del cumplimiento del requerimiento establecido.","req":"La política de la PPR requerirá que los miembros de la fuerza policiaca soliciten servicios médicos de inmediato cuando un individuo resulte lesionado o se queje de estar lesionado después de un incidente de uso de fuerza"},{"id":"RS-P038-003","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identifica Dashboard en el Automonitoreo que mida el cumplimiento de este requerimiento.","req":"La política de la PPR requerirá que los miembros de la fuerza policiaca soliciten servicios médicos de inmediato cuando un individuo resulte lesionado o se queje de estar lesionado después de un incidente de uso de fuerza."},{"id":"RS-P038-004","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento","req":"La política de la PPR requerirá que los miembros de la fuerza policiaca soliciten servicios médicos de inmediato cuando un individuo resulte lesionado o se queje de estar lesionado después de un incidente de uso de fuerza."},{"id":"RS-P038-005","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"No existe evidencia de que el sistema de información capture los datos relacionados a la transportación de un civil a un centro médico para tratamiento tomando la ruta más segura y directa hacia las instalaciones médicas, según dispone tanto el requerimiento del acuerdo como así también la OG 605- Sección Referidos/Traslados para atención Médica. inciso #3.","req":"La política también dispondrá que los policías que transportan a un civil a un centro médico para tratamiento tomarán la ruta más segura y directa hacia las instalaciones médicas."},{"id":"RS-P038-006","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identifica Dashboard en el Automonitoreo que mida el cumplimiento de este requerimiento.","req":"La política también dispondrá que los policías que transportan a un civil a un centro médico para tratamiento tomarán la ruta más segura y directa hacia las instalaciones médicas."},{"id":"RS-P038-007","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento","req":"La política también dispondrá que los policías que transportan a un civil a un centro médico para tratamiento tomarán la ruta más segura y directa hacia las instalaciones médicas."},{"id":"RS-P038-008","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"No se identificó en la Orden General 605 instrucciones sobre la documentación de millaje inicial en la PPR-126.2","req":"La política exigirá además que los miembros de la PPR notifiquen al Centro de Mando el millaje inicial y final del vehículo que efectúa el transporte."},{"id":"RS-P038-009","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"No existe evidencia de que el sistema de información permita la captura de más de un escenario que pueda ocurrir dentro de un mismo incidente, incluyendo aquellos en los que sea necesario registrar más de un evento con datos de millajes iniciales y finales.   Ejemplo 1: En un mismo incidente, un individuo lesionado por un uso de fuerza requiere ser trasladado a una institución médica, mientras que otra persona relacionada al evento, que no presenta lesiones, debe ser transportada bajo arresto a un cuartel.  Ejemplo 2: Un individuo lesionado tras un uso de fuerza es llevado primero a un hospita...","req":"La política exigirá además que los miembros de la PPR notifiquen al Centro de Mando el millaje inicial y final del vehículo que efectúa el transporte."},{"id":"RS-P038-010","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identificó en el Dashboard del Automonitoreo que mida el cumplimiento de los escenarios donde se deba documentar varios escenarios con millaje inicial y final, relacionados al mismo incidente.","req":"La política exigirá además que los miembros de la PPR notifiquen al Centro de Mando el millaje inicial y final del vehículo que efectúa el transporte."},{"id":"RS-P038-011","p":38,"est":"Con observaciones","area":"Uso de Fuerza","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento para varios escenarios","req":"La política exigirá además que los miembros de la PPR notifiquen al Centro de Mando el millaje inicial y final del vehículo que efectúa el transporte."},{"id":"RS-P102-001","p":102,"est":"Tarea Asignada","area":"Reclutamiento, Selección y Nombramiento","hall":"Actualmente, la PPR no cuenta con un Plan de Reclutamiento finalizado y formalmente aprobado.","req":"La PPR desarrollará un plan de reclutamiento que incluya metas, objetivos y pasos claros para atraer aspirantes cualificados de diversos sectores de la comunidad."},{"id":"RS-P038-012","p":38,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"Según los tableros de automonitoreo, actualmente se refleja que los datos de millaje no se están recopilando con precisión.","req":"La política exigirá además que los miembros de la PPR notifiquen al Centro de Mando el millaje inicial y final del vehículo que efectúa el transporte."},{"id":"RS-P200-001","p":200,"est":"Tarea Asignada","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El Reglamento 6403, titulado “Reglamento del Programa para la Detección de Sustancias Controladas en Funcionarios y Empleados de la Policía de Puerto Rico”, que rige el programa de pruebas de dopaje, data del 8 de marzo de 2002. Al momento de esta revisión, no se identifican enmiendas ni revisiones recientes al reglamento.","req":"Revisar continuamente el programa de pruebas de dopaje para asegurar confiabilidad y validez."},{"id":"RS-P200-002","p":200,"est":"Tarea Asignada","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"CMR12 “Este párrafo retrocedió a cumplimiento parcial debido a que el nuevo curso de adiestramiento sobre pruebas de dopaje aún no ha sido completamente implementado ni programado. La Oficina del Monitor espera que esta situación se rectifique prontamente.” – Donald Gosselin","req":"Revisar continuamente el programa de pruebas de dopaje para asegurar confiabilidad y validez."},{"id":"RS-P200-003","p":200,"est":"Tarea Asignada","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El Reglamento 6403, titulado “Reglamento del Programa para la Detección de Sustancias Controladas en Funcionarios y Empleados de la Policía de Puerto Rico”, que rige el programa de pruebas de dopaje, no detalla un proceso sistemático para la selección aleatoria de los empleados que serán sometidos a dichas pruebas.","req":"Realizar pruebas a nuevos oficiales (cadetes) y pruebas al azar a los MNPPR."},{"id":"RS-P200-004","p":200,"est":"Tarea Asignada","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"CMR-12 “A partir de las tablas provistas por la PPR, y excepto en el caso de los cadetes y candidatos a cadetes, es imposible determinar cuánto tiempo llevaban los miembros activos de la PPR sin haber sido sometidos previamente a una prueba.  La Oficina del Monitor continúa recomendando que la PPR dé prioridad a la realización de pruebas a los agentes juramentados que no han sido evaluados en los últimos cinco años. No está claro, a partir de los datos, si la PPR está llevando a cabo esta práctica.  Asimismo, reafirma que el número total de pruebas realizadas anualmente debe aumentar a aproxim...","req":"Realizar pruebas a nuevos oficiales (cadetes) y pruebas al azar a los MNPPR."},{"id":"RS-P200-006","p":200,"est":"Tarea Asignada","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El Reglamento 6403 “Reglamento del Programa para la Detección de Sustancias Controladas en Funcionarios y Empleados de la Policía de Puerto Rico” no hace referencia a la “Ley para Reglamentar las Pruebas para la Detección de Sustancias Controladas en el Empleo en el Sector Público” Ley 78-1997, según enmendada y la “Ley de Sustancias Controladas de Puerto Rico”, Ley 4 -1971, según enmendada.  Estas leyes no mencionan los esteroides, por lo tanto no se puede considerar como parte de las pruebas que se pueden realizar.","req":"Incluir pruebas de sustancias prohibidas o ilegales, incluyendo esteroides."},{"id":"RS-P200-007","p":200,"est":"Con observaciones","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"No se identifica Dashboard en el Automonitoreo que mida el cumplimiento del párrafo.","req":"Revisar continuamente el programa de pruebas de dopaje para asegurar confiabilidad y validez. Realizar pruebas a nuevos oficiales (cadetes) y pruebas al azar a los MNPPR. Incluir pruebas de sustancias prohibidas o ilegales, incluyendo esteroides."},{"id":"RS-P200-008","p":200,"est":"Con observaciones","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento","req":"Revisar continuamente el programa de pruebas de dopaje para asegurar confiabilidad y validez. Realizar pruebas a nuevos oficiales (cadetes) y pruebas al azar a los MNPPR. Incluir pruebas de sustancias prohibidas o ilegales, incluyendo esteroides"},{"id":"RS-P212-001","p":212,"est":"Tarea Asignada","area":"Interacción con la Comunidad e Información Pública","hall":"Actualmente no existe un sistema automatizado que permita evidenciar el cumplimiento con el requisito de que la PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque comunitario policíaco, orientado a identificar e implementar estrategias dirigidas a enfrentar la delincuencia y los problemas de seguridad.","req":"La PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque  comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad."},{"id":"RS-P212-002","p":212,"est":"Tarea Asignada","area":"Interacción con la Comunidad e Información Pública","hall":"No se identificó en la Orden General 801 el proceso completo para cumplir con el requerimiento de que la PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad.","req":"La PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque  comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad."},{"id":"RS-P102-002","p":102,"est":"Tarea Asignada","area":"Reclutamiento, Selección y Nombramiento","hall":"La Orden General 501 no establece la obligación de preparar un Plan de Reclutamiento, no define su periodicidad, vigencia o período de efectividad, no identifica los elementos mínimos que debe contener el plan ni los deberes del personal responsable de su implementación.","req":"La PPR desarrollará un plan de reclutamiento que incluya metas, objetivos y pasos claros para atraer aspirantes cualificados de diversos sectores de la comunidad."},{"id":"RS-P103-001","p":103,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"La información provista para la Petición de Datos de la Oficina del Monitor 0.056, utilizada para evaluar el cumplimiento de este párrafo, es incompleta y no permite evaluar de forma adecuada la efectividad de las estrategias de reclutamiento dirigidas a atraer aspirantes de grupos históricamente subrepresentados.","req":"El plan de reclutamiento incluirá estrategias específicas para atraer un grupo diverso de aspirantes, incluyendo a grupos históricamente subrepresentados."},{"id":"RS-P073-001","p":73,"est":"Con observaciones","area":"Registros y Allanamientos","hall":"El Protocolo de Intercambio de Información para la Retroalimentación de Componentes del Sistema de Justicia Criminal de Puerto Rico está vigente desde el 15 de diciembre de 2023.  No obstante, no se observa el cumplimiento estricto de lo que se establece en el mismo.","req":"Se desarrollará un protocolo para recibir comentarios regularmente de parte de las oficinas de fiscales, las oficinas de los defensores públicos, y los jueces del ELA sobre la calidad de las investigaciones, los arrestos, los testimonios en el tribunal, así como indicios de conducta impropia por miembros de la PPR"},{"id":"RS-P073-002","p":73,"est":"Con observaciones","area":"Registros y Allanamientos","hall":"La PPR debe asegurarse que los Comités de Retroalimentación realizando sus reuniones trimestrales y someten evidencia documentada, según lo establece y requiere el Protocolo de Retroalimentación.","req":"Entrevista a personal pertinente de la PRPB y realizar revisión de documentos cada seis (6) meses para determinar si la PRPB solicita y obtiene retroalimentación de las agencias y entidades del sistema de justicia penal, según lo requerido por los acuerdos y políticas aprobadas."},{"id":"RS-P158-001","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"No todas las áreas policíacas de la PPR, ni el Comité Central de Retroalimentación, están siendo consistentes en la celebración de las reuniones trimestrales requeridas por el Protocolo de Intercambio de Información para la Retroalimentación de Componentes del Sistema de Justicia Criminal de Puerto Rico del NPPR","req":"El comité de enlace a nivel ejecutivo compuesto por oficiales de alto mando del PRPD, se comunicará, al menos trimestralmente, con componentes de justicia criminal federales y locales en todas las regiones (tribunales, fiscales, universidad, policías municipales)."},{"id":"RS-P073-003","p":73,"est":"Con observaciones","area":"Registros y Allanamientos","hall":"La PPR debe asegurarse que los referidos a SARP sean atendidos y pueda identificarse el referido para propósitos de seguimiento en cuanto a la determinación final de la investigación. No existe evidencia de si del resultado de las reuniones de retroalimentación se hicieron referidos a SARP.","req":"La PPR referirá a la SARP cualquier información de incidentes específicos de posible conducta impropia de un miembro de la PPR que se reciba a través de este protocolo para investigación."},{"id":"RS-P158-002","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"La documentación que se provee para evidenciar las reuniones de los Comités de Retroalimentación, por área policiaca, es incompleta e inconsistente.","req":"Buscar retroalimentación e información mutua para mejorar el sistema de justicia criminal de Puerto Rico, incluyendo asuntos de desempeño relacionados al PRPD, sus oficiales, empleados o unidades."},{"id":"RS-P158-003","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"No se presenta evidencia que permita validar si en la reunión trimestral del Comité Central de Retroalimentación se atendió el tema de alegaciones de conducta indebida y si surgieron o no referidos al SARP como resultado de la discusión.","req":"Asegurar que toda alegación de conducta indebida o actividad criminal potencial sea referida al SARP y/o al PRDOJ para investigación, según corresponda."},{"id":"RS-P158-004","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"El Protocolo de Intercambio de Información necesita claridad en la definición de cómo deben integrarse los comités de área y el Comité Central. Quedo atenta a las repuesta.","req":"Establecer un comité de enlace a nivel ejecutivo compuesto por oficiales de alto mando del PRPD."},{"id":"RS-P158-005","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"No existe un tablero (dashboard) que permita medir y validar el cumplimiento de las reuniones trimestrales del Comité Central de Retroalimentación con componentes de justicia criminal federales y locales.","req":"El comité se comunicará, al menos trimestralmente, con componentes de justicia criminal federales y locales en todas las regiones (tribunales, fiscales, Universidad, policías municipales)."},{"id":"RS-P102-003","p":102,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"La PPR no cuenta con un Dashboard que permita validar la institucionalización del Plan de Reclutamiento, ni verificar de forma estructurada la inclusión de todos los elementos requeridos por la Orden General y el Acuerdo de Reforma.","req":"La PPR desarrollará un plan de reclutamiento que incluya metas, objetivos y pasos claros para atraer aspirantes cualificados de diversos sectores de la comunidad."},{"id":"RS-P158-006","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"No existe una herramienta de medición que permita evidenciar y validar, por reunión trimestral del Comité Central, el cumplimiento del proceso de referir a SARP aquellas alegaciones que así lo requieran.","req":"El comité se comunicará, al menos trimestralmente, con componentes de justicia criminal federales y locales en todas las regiones (tribunales, fiscales, universidad, policías municipales)."},{"id":"RS-P158-007","p":158,"est":"Para revisión","area":"Supervisión y Administración","hall":"No existe una herramienta de medición que permita evidenciar y validar, por reunión trimestral del Comité Central, el cumplimiento del proceso de referir a SARP aquellas alegaciones que así lo requieran.","req":"Todos los comandantes de alto nivel del PRPB que participen en el comité de enlace a nivel ejecutivo deberán asegurar que todas las alegaciones de conducta indebida o posible actividad delictiva sean referidas al SARP y/o al Departamento de Justicia de Puerto Rico (PRDOJ) para su investigación, según corresponda."},{"id":"RS-P212-003","p":212,"est":"Con observaciones","area":"Interacción con la Comunidad e Información Pública","hall":"No se identificó en el Dashboard del Automonitoreo que mida el cumplimiento de que la PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad.","req":"La PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque  comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad."},{"id":"RS-P212-004","p":212,"est":"Con observaciones","area":"Interacción con la Comunidad e Información Pública","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento con el requerimiento","req":"La PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad"},{"id":"RS-P212-005","p":212,"est":"Tarea Asignada","area":"Interacción con la Comunidad e Información Pública","hall":"No se identificó en la Orden General 801 el proceso completo para cumplir con el requerimiento de que la PPR trabajará en estrecha colaboración con los CICs para desarrollar un enfoque comunitario policíaco que identifique e implemente estrategias para hacerle frente a la delincuencia y los problemas de seguridad.","req":"Con el fin de promover dicha colaboración, la PPR compartirá la información y documentos correspondientes con los CICs, siempre que se toman las medidas de protección adecuadas para no revelar información confidencial o información sensible de la policía."},{"id":"RS-P212-006","p":212,"est":"Tarea Asignada","area":"Interacción con la Comunidad e Información Pública","hall":"Actualmente no existe un sistema automatizado que permita evidenciar el cumplimiento con el requisito de que permita capturar el proceso para evidenciar el rastreo de la colaboración entre la Policia y los CIC's garantizando las medidas de protección adecuadas para no revelar información confidencial o información sensible de la policía.","req":"Con el fin de promover dicha colaboración, la PPR compartirá la información y documentos correspondientes con las CICs, siempre que se toman las medidas de protección adecuadas para no revelar información confidencial o información sensible de la policía."},{"id":"RS-P212-007","p":212,"est":"Con observaciones","area":"Interacción con la Comunidad e Información Pública","hall":"No se identificó en el Dashboard del Automonitoreo que mida el cumplimiento de que: Con el fin de promover dicha colaboración, la PPR compartirá la información y documentos correspondientes con las CICs, siempre que se toman las medidas de protección adecuadas para no revelar información confidencial o información sensible de la policía.","req":"Con el fin de promover dicha colaboración, la PPR compartirá la información y documentos correspondientes con las CICs, siempre que se toman las medidas de protección adecuadas par
