id":"RS-P209-001","p":209,"est":"Para revisión","area":"Interacción con la Comunidad e Información Pública","hall":"No se identifica Dashboard en el Automonitoreo que mida el cumplimiento de estos dos requerimientos.","req":"La PPR conservará los Comités de Interacción Ciudadana (“CICs\\\" por sus siglas en  inglés) en conjunto con los representantes de la comunidad para facilitar la comunicación y cooperación regular entre la PPR y los líderes de la comunidad local. Los CICs se reunirán, como  mínimo, cada tres (3) meses."},{"id":"RS-P209-002","p":209,"est":"Para revisión","area":"Interacción con la Comunidad e Información Pública","hall":"No se identifica scorecard en el Automonitoreo para realizar Inspección de Cumplimiento con el requerimiento","req":"La PPR conservará los Comités de Interacción Ciudadana (“CICs\\\" por sus siglas en  inglés) en conjunto con los representantes de la comunidad para facilitar la comunicación y cooperación regular entre la PPR y los líderes de la comunidad local. Los CICs se reunirán, como  mínimo, cada tres (3) meses."},{"id":"RS-P092-001","p":92,"est":"Tarea Asignada","area":"Igual Protección y No Discrimen","hall":"La orden general 635, no contiene el requerimiento del párrafo.","req":"…la PRPD deberá preparar y entregar al PRDOJ y al Departamento de la Familia de Puerto Rico el informe preliminar de investigación."},{"id":"RS-P092-002","p":92,"est":"Tarea Asignada","area":"Igual Protección y No Discrimen","hall":"OG 635 y PPR 635.1 no definen claramente los términos o que constituye “abuso y maltrato”, lo que genera confusión entre los oficiales sobre qué incidentes reportar.","req":"…dichas alegaciones incluyen abuso físico y mental, agresiones entre menores, abuso de parte del personal hacia menores y uso excesivo de la fuerza por parte del personal."},{"id":"RS-P092-004","p":92,"est":"Con observaciones","area":"Igual Protección y No Discrimen","hall":"La información que presenta el Dashboard no incluye los detalles del informe preliminar, limitándose únicamente a validar si se realizó el referido al Departamento de Justicia y al Departamento de la Familia.","req":"…la PRPD deberá preparar y entregar al PRDOJ y al Departamento de la Familia de Puerto Rico el informe preliminar de investigación."},{"id":"RS-P092-005","p":92,"est":"Con observaciones","area":"Igual Protección y No Discrimen","hall":"Las clasificaciones de los incidentes y alegaciones no son consistentes con los criterios establecidos en el párrafo.","req":"…dichas alegaciones incluyen abuso físico y mental, agresiones entre menores, abuso de parte del personal hacia menores y uso excesivo de la fuerza por parte del personal."},{"id":"RS-P092-006","p":92,"est":"Tarea Asignada","area":"Igual Protección y No Discrimen","hall":"La documentación entregada a la Oficina del Monitor contesta parcialmente la solicitud, al no contener todos los elementos requeridos.","req":"la PRPD deberá preparar y entregar al PRDOJ y al Departamento de la Familia de Puerto Rico el informe preliminar de investigación"},{"id":"RS-P092-007","p":92,"est":"Con observaciones","area":"Igual Protección y No Discrimen","hall":"No es posible medir el cumplimiento en su totalidad, solo con el Dashboard actual.","req":"Dentro de un plazo de cinco días laborables, la PRPD deberá preparar y entregar al PRDOJ y al Departamento de la Familia de Puerto Rico el informe preliminar de investigación preparado en respuesta a cada alegación de abuso o maltrato originada en instalaciones juveniles de detención segura."},{"id":"RS-P103-002","p":103,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"El Departamento de Reclutamiento tiene pendiente finalizar la revisión del Dashboard de Reclutamiento, el cual fue desarrollado para evaluar la efectividad de la implemtación del Plan de Reclutamiento (esfuerzos de reclutamiento), conforme a lo requerido en la metodología para la medición de este párrafo del Acuerdo.","req":"El plan de reclutamiento incluirá estrategias específicas para atraer un grupo diverso de aspirantes, incluyendo a grupos históricamente subrepresentados."},{"id":"RS-P205-001","p":205,"est":"Cerrado","area":"Interacción con la Comunidad e Información Pública","hall":"Al presente, el Área de Humacao no ha completado la entrega de la plantilla del Plan Operacional Piloto, con la integración de los siguientes datos: Actividades Preventivas, Difusión de Información Pública, Alianzas Comunitarias y Modelo SARA.","req":"La PPR desarrollará relaciones sólidas con la comunidad y se involucrará de  manera constructiva con ésta para asegurar la colaboración en la solución de problemas, servicios policiacos éticos y una prevención más efectiva del crimen. La PPR integrará principios policiacos orientados a la solución de problemas y a la administración de sus políticas y procedimientos, reclutamiento, adiestramiento, ..."},{"id":"RS-P129-001","p":129,"est":"Completado","area":"Adiestramiento","hall":"El Plan de Capacitación Anual en Servicio para el año 2026 no se encuentra disponible.","req":"La Policía de Puerto Rico (PPR) establecerá un programa obligatorio de capacitación en el servicio de al menos cuarenta (40) horas anuales, que cumpla con las prácticas policiacas generalmente aceptadas en cuanto a calidad y contenido, y que refleje los requisitos establecidos en el Acuerdo de Reforma."},{"id":"RS-P133-001","p":133,"est":"Tarea Asignada","area":"Adiestramiento","hall":"No se encuentra disponible matriz consolidada que relacione los adiestramientos vigentes con los párrafos aplicables del Acuerdo, su fecha de revisión curricular, la población objetivo.","req":"La PPR mantendrá expedientes digitalizados, completos y exactos de currículos actualizados, planes de lección, y otros materiales de formación en un sistema de archivos centralizado, accesible y organizado."},{"id":"RS-P121-001","p":121,"est":"Completado","area":"Adiestramiento","hall":"La implementación de los resultados del análisis de necesidades de adiestramiento no ha sido comenzada.","req":"La PPR y el CUJC realizarán evaluaciones de necesidad de forma regular para garantizar que el adiestramiento relacionado con la implementación de este Acuerdo responde a los conocimientos, las aptitudes y las capacidades de los cadetes y personal de rango siendo capacitados. (Párrafo 121).  La PPR identificará temas clave de capacitación a base de un análisis de factores que incluirán, pero no se ..."},{"id":"RS-P129-002","p":129,"est":"Tarea Asignada","area":"Adiestramiento","hall":"Luego de la reunión sostenida con la SAEA el 4 de noviembre de 2025, la Monitora manifestó preocupación de que no se logrará cumplir con la ejecución del Plan de Capacitación Anual en Servicio 2025 (CASE 5061 / VCASE 5061) conforme al calendario establecido.  La Monitora identificó como factores que afectan el cumplimiento las siguientes dinámicas:  -la interferencia con otros planes operacionales en curso,  -el ausentismo del personal, y  -la baja participación de instructores para cubrir la totalidad de los módulos.","req":"La Policía de Puerto Rico (PPR) establecerá un programa obligatorio de capacitación en el servicio de por lo menos cuarenta (40) horas anuales, que cumpla con las prácticas policiacas generalmente aceptadas en cuanto a calidad y contenido, y que refleje los requisitos del Acuerdo."},{"id":"RS-P086-001","p":86,"est":"Tarea Asignada","area":"Igual Protección y No Discrimen","hall":"Se identificó que la OG-630 no incorpora los requisitos establecidos para la investigación, clasificación, documentación y reporte de crímenes de odio, incluyendo la notificación al FBI y los elementos de investigación  requeridos, lo cual impide demostrar cumplimiento con los objetivos operacionales requeridos","req":"La PPR recopilará en forma continua datos precisos y confiables de los crímenes  de odio, y enviará dicha información al Negociado Federal de Investigaciones (“FBI” por sus siglas en inglés) para análisis y publicación en el Informe de Estadísticas de Crímenes de Odio del FBI conforme a los requisitos de publicación de datos del mismo."},{"id":"RS-P086-002","p":86,"est":"Tarea Asignada","area":"Igual Protección y No Discrimen","hall":"Durante la revisión del párrafo 86 del Acuerdo, se identificó que el Manual para la Identificación e Investigación de Crímenes de Odio, aunque contiene definiciones, criterios y guías de investigación, no establece el proceso institucional necesario para recopilar datos, notificar al FBI, validar estadísticas ni cumplir con los requisitos investigativos y operacionales del párrafo.","req":"La PPR recopilará en forma continua datos precisos y confiables de los crímenes  de odio, y enviará dicha información al Negociado Federal de Investigaciones (“FBI” por sus siglas  en inglés) para análisis y publicación en el Informe de Estadísticas de Crímenes de Odio del FBI conforme a los requisitos de publicación de datos del mismo."},{"id":"RS-P102-004","p":102,"est":"Tarea Asignada","area":"Reclutamiento, Selección y Nombramiento","hall":"El borrador del Plan de Reclutamiento no define metas específicas asociadas a los objetivos definidos, ni identifica los pasos claros que se llevarán a cabo para lograr cada objetivo.","req":"El plan de reclutamiento de la PRPD deberá establecer e identificar claramente las metas de los esfuerzos de reclutamiento de la PRPD y los deberes del personal y los funcionarios responsables de implementarlo."},{"id":"RS-P102-005","p":102,"est":"Tarea Asignada","area":"Reclutamiento, Selección y Nombramiento","hall":"El borrador del Plan de Reclutamiento no incluye la definición de los deberes del personal ni de los funcionarios responsables de su implementación.","req":"El plan de reclutamiento de la PRPD deberá establecer e identificar claramente las metas de los esfuerzos de reclutamiento de la PRPD y los deberes del personal y los funcionarios responsables de implementarlo."},{"id":"RS-P086-003","p":86,"est":"Tarea Asignada","a nero, así como los incidentes en los cuales más de una persona es arrestada. La PPR publicará estos datos com..."},{"id":"RS-P103-003","p":103,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"Los esfuerzos de reclutamiento no evidencian que se estén llevando a cabo de manera consistente en toda la isla ni que incluyan un acercamiento específico y documentado a poblaciones subrepresentadas.","req":"El plan de reclutamiento incluirá acercamiento a la población general y acercamiento dirigido a poblaciones subrepresentadas (ej. mujeres, comunidad dominicana)."},{"id":"RS-P103-004","p":103,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"No existe una herramienta de medición que permita evidenciar que los esfuerzos de reclutamiento se están llevando a cabo en toda la isla ni que incluyan un acercamiento específico a poblaciones subrepresentadas.","req":"El plan de reclutamiento incluirá acercamiento a la población general y acercamiento dirigido a poblaciones subrepresentadas (ej. mujeres, comunidad dominicana)."},{"id":"RS-P073-004","p":73,"est":"Con observaciones","area":"Registros y Allanamientos","hall":"No existe información consolidada de las reuniones trimestrales que se llevaron a cabo por el Comité Central y por las trece áreas policiacas. Las Agendas y Minutas de las reuniones no incluyen información de referidos: a (1) SARP, (2) Políticas y Procedimientos (3) Adiestramientos","req":"La PPR debe asegurarse de cumplir con lo que establece Protocolo de Intercambio de Información para la Retroalimentación de Componentes del Sistema de Justicia Criminal de Puerto Rico en cuanto al cumplimiento con las reuniones trimestrales."},{"id":"RS-P065-001","p":65,"est":"Con observaciones","area":"Adiestramiento","hall":"Actualmente, los documentos que se entregan, en específico la PPR 615.8, en ocasiones no son revisados/aprobados debidamente por los supervisores.","req":"La PPR revisará sus políticas sobre los arrestos para garantizar que éstas cumplan con la ley aplicable y las prácticas policiacas generalmente aceptadas."},{"id":"RS-P065-002","p":65,"est":"Con observaciones","area":"Adiestramiento","hall":"Actualmente, los documentos que se entregan, en específico la PPR 631.1, en ocasiones no son incluidos/revisados/aprobados debidamente por los supervisores.","req":"La PPR revisará sus políticas sobre los arrestos para garantizar que éstas cumplan con la ley aplicable y las prácticas policiacas generalmente aceptadas."},{"id":"RS-P065-003","p":65,"est":"Con observaciones","area":"Adiestramiento","hall":"Según CMR 13 no se está cumpliendo con el 95% del objetivo de completar el formulario 615.8  en el término de las 12 horas, a partir que la persona arrestada haya sido procesada. Se debe reconsiderar si el término de 12 horas es razonable debido a todos los pasos que se llevan a cabo para completar el expediente del arresto.","req":"La OG – 615 pág. 24 (Sección III, D – 5f)  establece que en los casos que se efectúa una arresto sin orden  se debe completar el formulario 615.8 dentro de las 12 horas a partir que la persona arrestada haya sido procesada."},{"id":"RS-P065-004","p":65,"est":"Con observaciones","area":"Adiestramiento","hall":"El 95% de cumplimiento en los 5 objetivos no se ha alcanzado. Se ha llegado a un 88%. El Acuerdo no indica un por ciento de cumplimiento específico. Se debe evaluar realizar una petición formal al Tribunal para cambiar la metodología a un por ciento razonable que permita el cumplimiento.","req":"95% de cumplimiento exigido en cinco (5) de los parámetros de cumplimiento para el párrafo 65.: 2. 95% of selected arrests are notified and reviewed by supervisors in accordance with approved policies.  3. Officers transport arrestees and complete required arrest documentation in accordance with approved policies in 95% of selected arrests. 4a. Supervisors respond to injuries and complaints of pai..."},{"id":"RS-P173-001","p":173,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El Manual del Investigador establece que se deben realizar las investigaciones de forma paralela y simultánea, sin embargo, las mismas no se realizan debido a la falta de una OG que establezca los procesos.","req":"En un término de cinco (5) días laborales, contados a partir del recibo de la querella por conducta impropia, la SARP determinará si la querella se le asignará a un supervisor para la correspondiente investigación, será retenida por la SARP para su investigación, y si el caso será investigado criminalmente por la PPR, el DJPR, o ambos."},{"id":"RS-P173-002","p":173,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El sistema SARP Web actualmente no tiene la funcionalidad que permite la asignación y trazabilidad de las investigaciones administrativas y criminales de manera paralela desde el inicio.","req":"En un término de cinco (5) días laborales, contados a partir del recibo de la querella por conducta impropia, la SARP determinará si la querella se le asignará a un supervisor para la correspondiente investigación, será retenida por la SARP para su investigación, y si el caso será investigado criminalmente por la PPR, el DJPR, o ambos."},{"id":"RS-P182-001","p":182,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El párrafo fue deferido debido a que no se hallaron casos Garrity en la muestras de las peticiones 3.091 d y 3.093 del CMR-13 Petición 3.2.","req":"El policía objeto de una investigación administrativa no será obligado a rendir declaración alguna ante los investigadores administrativos cuando exista una posible investigación o proceso criminal, hasta que finalice la misma, y luego de que los investigadores administrativos hayan consultado con la Oficina de Fiscalía y el Superintendente Auxiliar de la SARP, excepto cuando la toma de dicha decl..."},{"id":"RS-P182-002","p":182,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"El párrafo fue diferido debido a que no se hallaron casos en los cuales se utilizaran las Advertencias Garrity en la muestras entregadas en relación con las peticiones 3.091 d y 3.093 del CMR-13 (Petición 3.2).","req":"El policía objeto de una investigación administrativa no será obligado a rendir declaración alguna ante los investigadores administrativos cuando exista una posible investigación o proceso criminal, hasta que finalice la misma, y luego de que los investigadores administrativos hayan consultado con la Oficina de Fiscalía y el Superintendente Auxiliar de la SARP, excepto cuando la toma de dicha decl..."},{"id":"RS-P182-003","p":182,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"Realizar revisión del adiestramiento con ejemplos prácticos para asegurar comprensión de la aplicación de las Advertencias Garrity.","req":"El policía objeto de una investigación administrativa no será obligado a rendir declaración alguna ante los investigadores administrativos cuando exista una posible investigación o proceso criminal, hasta que finalice la misma, y luego de que los investigadores administrativos hayan consultado con la Oficina de Fiscalía y el Superintendente Auxiliar de la SARP, excepto cuando la toma de dicha decl..."},{"id":"RS-P182-004","p":182,"est":"Para revisión","area":"Querellas Administrativas, Investigaciones Internas y Disciplina","hall":"Falta de separación funcional y operativa entre las investigaciones administrativas y las investigaciones criminales, lo que impide el cumplimiento del Acuerdo.","req":"El policía objeto de una investigación administrativa no será obligado a rendir declaración alguna ante los investigadores administrativos cuando exista una posible investigación o proceso criminal, hasta que finalice la misma, y luego de que los investigadores administrativos hayan consultado con la Oficina de Fiscalía y el Superintendente Auxiliar de la SARP, excepto cuando la toma de dicha decl..."},{"id":"RS-P102-006","p":102,"est":"Completado","area":"Reclutamiento, Selección y Nombramiento","hall":"La implementación del adiestramiento de reclutamiento conforme a la OG-501 para todo el personal de la Policía de Puerto Rico involucrado en el proceso de reclutamiento no ha sido certificado por SAEA, según requerido para evidenciar el cumplimiento del párrafo del Acuerdo.","req":"La PPR desarrollará un plan de reclutamiento que incluya metas, objetivos y pasos claros para atraer aspirantes cualificados de diversos sectores de la comunidad."},{"id":"RS-P032-001","p":32,"est":"Para revisión","area":"Uso de Fuerza","hall":"La OG-625 y la OG-113, No establece de forma expresa una política integral de control de multitudes y manejo de incidentes.","req":"La PPR desarrollará políticas de control de multitudes y manejo de incidentes que  cumplan con las leyes aplicables y que sean acordes con las prácticas policiacas generalmente  aceptadas."},{"id":"RS-P034-001","p":34,"est":"Para revisión","area":"Uso de Fuerza","hall":"Las OG-625 y OG-610 No contienen lenguaje normativo expreso que requiera lo establecido en el requerimiento del párrafo 34","req":"La política de control de multitudes requerirá el uso de técnicas de control de masas  y tácticas que respeten la libertad de expresión y el derecho a reunirse de forma legal."},{"id":"RS-P035-001","p":35,"est":"Para revisión","area":"Uso de Fuerza","hall":"Las OG-625, OG-610 y OG-113 No establecen de forma expresa y obligatoria los requerimientos del párrafo 35","req":"La política de la PPR requerirá la evaluación de las actividades de aplicación de la  ley después de cada respuesta a una manifestación de masas, disturbio civil o cualquier otra  situación de masas para garantizar el cumplimiento de las leyes aplicables y las políticas y  procedimientos de la PPR."},{"id":"RS-P033-001","p":33,"est":"Para revisión","area":"Uso de Fuerza","hall":"Las OG-625 y OG-113 NO contienen lenguaje textual ni normativo que disponga expresamente los requerimientos de este párrafo.","req":"La política de manejo de incidentes dispondrá que un oficial de alto rango o algún  otro policía de rango superior esté presente en la escena de una manifestación masiva, disturbio civil o cualquier otra situación de multitudes para asumir el mando y control, y dar la autorización antes de usar la fuerza como técnica de dispersión de multitudes."},{"id":"RS-P154-001","p":154,"est":"Tarea Asignada","area":"Supervisión y Administración","hall":"No se evidencia la existencia de un sistema de auditoría plenamente alineado al requerimiento del Acuerdo. Como parte del sistema de auditoria la Orden General 121 y el Manual de Inspecciones no contiene de forma explicita un proceso formal de análisis de causas y factores contribuyentes a deficiencias operacionales","req":"Establecer un sistema de auditoría que identifique deficiencias operacionales, analice factores causales/contributivos y aplique acciones correctivas efectivas."},{"id":"RS-P156-001","p":156,"est":"Para revisión","area":"Supervisión y Administración","hall":"Las inspecciones (auditorias) no reflejan evidencia de revisión por parte del Superintendente o sus representantes designados.","req":"El Superintendente revisará cada auditoría para determinar acciones apropiadas en políticas, disciplinarias y/o correctivas no punitivas apropiadas."},{"id":"RS-P156-002","p":156,"est":"Para revisión","area":"Supervisión y Administración","hall":"No existe un Dashboard que permita validar y monitorear si la Unidad de Inspecciones (auditores) emitió un informe al Superintendente con el resultado de cada auditoría.","req":"Los auditores de la PPR emitirán un informe al Superintendente con el resultado de cada auditoría."},{"id":"RS-P156-003","p":156,"est":"Para revisión","area":"Supervisión y Administración","hall":"No existe un Dashboard que permita validar y monitorear si la Unidad de Inspecciones (auditores) emitió un informe al Superintendente con el resultado de cada auditoría.","req":"El Superintendente revisará cada auditoría para determinar acciones apropiadas en políticas, disciplinarias y/o correctivas no punitivas apropiadas."},{"id":"RS-P107-001","p":107,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"Se identificó que la documentación que respalda cada uno de los pasos del proceso resulta insuficiente y, en algunos casos, no está disponible en los expedientes de los candidatos.","req":"La PPR evaluará y revisará sus políticas y prácticas para asegurar investigaciones de antecedentes completas, objetivas y oportunas"},{"id":"RS-P107-002","p":107,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"Se realizan investigaciones de antecedentes (historial criminal, crédito, empleo, toxicología), pero la documentación es insuficiente","req":"La determinación de elegibilidad incluirá evaluaciones: del historial de crédito,  antecedentes penales, historial de empleo, uso y abuso de sustancias controladas, capacidad de trabajar con comunidades diversas y actuar imparcialmente"},{"id":"RS-P107-003","p":107,"est":"Para revisión","area":"Reclutamiento, Selección y Nombramiento","hall":"No se evidencia de forma sistemática que las determinaciones favorables expiren a los seis meses, ni que exista un mecanismo automatizado o manual que controle y documente la vigencia de estas determinaciones","req":"Las determinaciones de elegibilidad favorables expirarán a los seis meses"},{"id":"RS-P075-001","p":75,"est":"Tarea Asignada","area":"Registros y Allanamientos","hall":"No existe un formulario oficial para documentar la evaluación y aprobación de las solicitudes de órdenes de registro, allanamiento o arresto realizadas por el Supervisor, antes de su presentación al Juez.","req":"La PPR requerirá que los supervisores verifiquen y aprueben por escrito toda solicitud de orden de registro, allanamiento o arresto, incluyendo cada declaración jurada, antes de que sea presentada por un miembro de la PPR en apoyo de una solicitud de una orden, para verificar si es adecuada, legal y conforme a la política de la PPR."},{"id":"RS-P157-001","p":157,"est":"Para revisión","area":"Supervisión y Administración","hall":"La Orden General de Auditorías de Integridad OG-649, necesaria para institucionalizar este proceso en la PPR, se encuentra en estatus de borrador y pendiente de revisión por parte del Director de la Oficina de Reforma","req":"La PPR deberá desarrollar e implementar un plan para realizar auditorías de integridad de manera regular, dirigida y aleatoria."},{"id":"RS-P021-001","p":21,"est":"Tarea Asignada","area":"Profesionalización","hall":"Revisar y Actualizar la OG-213 Programa de Desarrollo Profesional de Carrera","req":"La PPR proveerá una trayectoria de desarrollo profesional para el personal de rango que aspire a ascender a oficiales de alto rango, que enfatice el liderazgo, ética, principios de policía comunitaria, logros académicos y prácticas policiacas constitucionales."},{"id":"RS-P021-002","p":21,"est":"Tarea Asignada","area":"Profesionalización","hall":"Evaluar contenido de UDEMY y determinar los cursos aplicables al currículo de SAEA","req":"La PPR proveerá una trayectoria de desarrollo profesional para el personal de rango que aspire a ascender a oficiales de alto rango, que enfatice el liderazgo, ética, principios de policía comunitaria, logros académicos y prácticas policiacas constitucionales"},{"id":"RS-P147-001","p":147,"est":"Tarea Asignada","area":"Supervisión y Administración","hall":"Las fechas proyectadas para los adiestramientos de supervisores relacionados con el sistema EIS aún no han sido confirmadas.","req":"La PPR desarrollará, implementará y mantendrá un sistema de identificación temprana (“EIS” por sus siglas en inglés) para apoyar la supervisión y administración efectiva del personal de rango y civil de la PPR, incluyendo la identificación de y respuesta a comportamientos problemáticos tan pronto como sea posible. La PPR utilizará regularmente los datos del EIS para promover prácticas policiacas é..."},{"id":"RS-P075-002","p":75,"est":"Para revisión","area":"Registros y Allanamientos","hall":"No existe un formulario oficial para documentar la evaluación y aprobación de las solicitudes de órdenes de registro, allanamiento o arresto realizadas por el Supervisor, antes de su presentación al Juez.","req":"La PPR requerirá que los supervisores verifiquen y aprueben por escrito toda solicitud de orden de registro, allanamiento o arresto, incluyendo cada declaración jurada, antes deque sea presentada por un miembro de la PPR en apoyo de una solicitud de una orden,para verificar si es adecuada, legal y conforme a la política de la PPR."},{"id":"RS-P222-001","p":222,"est":"Para revisión","area":"Sistemas de Información y Tecnología","hall":"Actualmente no existe una política o procedimiento formal que requiera a los supervisores utilizar dispositivos portátiles de grabación para documentar declaraciones de querellantes y testigos en investigaciones de uso de fuerza o conducta indebida, conforme a lo requerido por el Párrafo 222.","req":"La Policía de Puerto Rico deberá establecer e implementar una política que requiera que los supervisores utilicen dispositivos portátiles de grabación para registrar las declaraciones de querellantes y testigos obtenidas como parte de investigaciones relacionadas con incidentes de uso de fuerza o alegaciones de conducta indebida."},{"id":"RS-P075-003","p":75,"est":"Para revisión","area":"Registros y Allanamientos","hall":"No existe un formulario oficial para documentar la evaluación y aprobación de las solicitudes de órdenes de registro, allanamiento o arresto realizadas por el Supervisor, antes de su presentación al Juez.","req":"La PPR requerirá que los supervisores verifiquen y aprueben por escrito toda solicitud de orden de registro, allanamiento o arresto, incluyendo cada declaración jurada, antes de que sea presentada por un miembro de la PPR en apoyo de una solicitud de una orden, para verificar si es adecuada, legal y conforme a la política de la PPR."},{"id":"RS-P075-004","p":75,"est":"Para revisión","area":"Registros y Allanamientos","hall":"No existe un formulario oficial para documentar la evaluación y aprobación de las solicitudes de órdenes de registro, allanamiento o arresto realizadas por el Supervisor, antes de su presentación al Juez.","req":"La PPR requerirá que los supervisores verifiquen y aprueben por escrito toda solicitud de orden de registro, allanamiento o arresto, incluyendo cada declaración jurada, antes de que sea presentada por un miembro de la PPR en apoyo de una solicitud de una orden, para verificar si es adecuada, legal y conforme a la política de la PPR."},{"id":"RS-P121-002","p":121,"est":"Para revisión","area":"Adiestramiento","hall":"La política oficial de la PPR (Orden General 700-703 Adiestramientos y Readiestramientos) no incluye disposiciones específicas relacionadas con el requerimiento de llevar a cabo evaluaciones periódicas de necesidades de adiestramiento.","req":"Hay dos requisitos principales:  1 - Se debe establecer un plan de adiestramiento que incluya estándares claros sobre los criterios de aprobación, los requisitos de asistencia y participación, y los métodos de evaluación válidos, con el propósito de asegurar que el personal adquiera los conocimientos, destrezas y competencias necesarias para el desempeño de sus funciones.  2 - La PPR y SAEA debe l..."},{"id":"RS-P041-001","p":41,"est":"Tarea Asignada","area":"Uso de Fuerza","hall":"El informe anual de tendencias de uso de fuerza del 2024 presenta principalmente información descriptiva sobre los incidentes y aplicaciones reportadas, sin evidenciar de forma clara un análisis estructurado de tendencias significativas ni la identificación de medidas correctivas derivadas del análisis de los datos.","req":"La PPR será responsable de mantener un sistema de rastreo confiable y preciso de  uso de fuerza por parte de todos los policías; de todas las revisiones de uso de fuerza realizadas por los supervisores; de todas las investigaciones de uso de fuerza llevadas a cabo por las Unidades de Investigación de Uso de Fuerza (“FIU”, por sus siglas en inglés); y de todas las revisiones de uso de fuerza dirigi..."},{"id":"RS-P113-001","p":113,"est":"Tarea Asignada","area":"Políticas y Procedimientos","hall":"Actualmente no existe un Plan de Acción que defina cómo se va a cumplir con el Calendario de Revisión de Políticas y Procedimientos anuales.","req":"Cada política o procedimiento que sea elaborada o enmendada según el presente Acuerdo será revisada anualmente durante los primeros tres (3) años a partir de la fecha de nombramiento del TCA o tan pronto se notifique una deficiencia sobre la misma. Una vez transcurra el término inicial, serán revisadas cada dos (2) años según un calendario establecido por la PPR."},{"id":"RS-P113-002","p":113,"est":"Aprobado para discusión","area":"Políticas y Procedimientos","hall":"Durante el proceso de preparación del Calendario de Revisión de Políticas y Procedimientos del año en curso, se identificó que existen 43 Órdenes Generales y Reglamentos pendientes de revisión correspondientes al ciclo anterior, lo que evidencia un retraso en el proceso de revisión periódica de políticas conforme al calendario requerido por el párrafo 113 del Acuerdo.","req":"Cada política o procedimiento que sea elaborada o enmendada según el presente Acuerdo será revisada anualmente durante los primeros tres (3) años a partir de la fecha de nombramiento del TCA o tan pronto se notifique una deficiencia sobre la misma. Una vez transcurra el término inicial, serán revisadas cada dos (2) años según un calendario establecido por la PPR."},{"id":"RS-P145-001","p":145,"est":"Para revisión","area":"Supervisión y Administración","hall":"Entrevistas realizadas por el Monitor Federal entre enero y septiembre 2025 revelaron que el 30% del personal no se reunió con su supervisor para discutir la evaluación o desarrollo de carrera, y un 10% reportó que solo se les preguntó si estaban de acuerdo con la evaluación, sin discusión adicional.","req":"La PPR desarrollará e implementará un sistema específico para evaluar con exactitud la calificación y el desempeño de todos los miembros de la PPR en áreas que incluirán, pero no están limitadas a, prácticas policiacas constitucionales, integridad, policía comunitaria y funciones policiacas críticas, tanto continua como anualmente."},{"id":"RS-P121-003","p":121,"est":"Para revisión","area":"Adiestramiento","hall":"El Plan de Adiestramiento 2026 desarrollado por la SAEA no incluye, para ninguno de sus cursos, los estándares de aprobación, requisitos de asistencia y participación, ni los métodos de evaluación requeridos por el Párrafo 121.","req":"Se debe establecer un plan de adiestramiento que incluya estándares claros sobre los criterios de aprobación, los requisitos de asistencia y participación, y los métodos de evaluación válidos, con el propósito de asegurar que el personal adquiera los conocimientos, destrezas y competencias necesarias para el desempeño de sus funciones.  La PPR y SAEA debe llevar a cabo evaluaciones periódicas de n..."},{"id":"RS-P146-001","p":146,"est":"Para revisión","area":"Supervisión y Administración","hall":"El Monitor Federal identificó casos donde las evaluaciones fueron realizadas por supervisores que no supervisaban directamente al evaluado o estaban en turnos distintos.    Persisten los mismos retos: falta de reuniones presenciales, evaluaciones hechas por supervisores no directos, falta de tiempo para discusiones de desarrollo.","req":"La PPR establecerá un método formalizado de documentación de las evaluaciones de desempeño anual de cada MPPR por parte de su supervisor directo. Dicho supervisor será responsable ante la PPR de completar las evaluaciones de desempeño de sus subordinados de manera oportuna, precisa y completa."},{"id":"RS-P133-002","p":133,"est":"Para revisión","area":"Adiestramiento","hall":"En el CMR-12, la Oficina del Monitor Federal determinó que el Criterio de Cumplimiento #2 del Párrafo 133 no fue cumplido. No se evidenció que la PPR haya impartido adiestramiento al personal responsable del almacenamiento y preservación de registros y materiales de adiestramiento.","req":"La PPR mantendrá expedientes digitalizados, completos y exactos de currículos actualizados, planes de lección, y otros materiales de formación en un sistema de archivos centralizado, accesible y organizado. Conforme al Criterio de Cumplimiento #2 de este párrafo, el adiestramiento sobre el almacenamiento y la preservación de los registros y materiales de adiestramiento deberá ser consistente con l..."},{"id":"RS-P147-002","p":147,"est":"Para revisión","area":"Supervisión y Administración","hall":"El EIS no está implementado. Se reportan avances en la contratación de Benchmark Analytics y desarrollo de dashboards, pero el sistema aún no está en funcionamiento","req":"La PRP debe desarrollar, implementar y mantener un sistema de intervención temprana (EIS) para apoyar la supervisión y gestión efectiva del personal, identificando y respondiendo a conductas problemáticas lo antes posible. El EIS debe usarse regularmente para promover prácticas éticas y profesionales, gestionar riesgos y evaluar el desempeño en todos los rangos y unidades."},{"id":"RS-P148-001","p":148,"est":"Para revisión","area":"Supervisión y Administración","hall":"El sistema EIS aún no está implementado, por lo que no se puede verificar la inclusión de todos los indicadores requeridos.","req":"El EIS debe incluir una base de datos relacional que recopile, mantenga, integre y recupere datos detallados sobre: uso de fuerza, lesiones, quejas, datos de detenciones, procesos judiciales, acciones disciplinarias, historial de entrenamiento, información demográfica, etc."},{"id":"RS-P149-001","p":149,"est":"Para revisión","area":"Supervisión y Administración","hall":"No hay evidencia de uso del EIS por parte de supervisores ni de la existencia de la unidad plenamente funcional.","req":"La PRP debe establecer una unidad para desarrollar, implementar y mantener el EIS, con recursos suficientes para facilitar la entrada de datos y proveer entrenamiento y asistencia a los usuarios."},{"id":"RS-P150-001","p":150,"est":"Para revisión","area":"Supervisión y Administración","hall":"No se puede evaluar la disponibilidad de equipos ni el acceso seguro hasta que el sistema esté implementado.","req":"La PRP debe mantener el equipo necesario, en cantidad suficiente y en buen estado, para que el personal apropiado tenga acceso seguro y oportuno al EIS, permitiendo la entrada y revisión de datos."},{"id":"RS-P151-001","p":151,"est":"Para revisión","area":"Supervisión y Administración","hall":"No se puede verificar la existencia ni la aplicación del protocolo hasta que el sistema esté implementado.","req":"La PRP debe desarrollar un protocolo para el uso del EIS y la información obtenida, incluyendo almacenamiento, recuperación, reportes, análisis, identificación de patrones, intervenciones, documentación, auditorías, acceso y confidencialidad."},{"id":"RS-P152-001","p":152,"est":"Para revisión","area":"Supervisión y Administración","hall":"No se puede evaluar la conservación ni la seguridad de la información hasta que el sistema esté implementado.","req":"La PRP debe mantener toda la información personal identificable en el EIS por al menos cinco años después de la separación del empleado. La información necesaria para análisis estadístico debe mantenerse indefinidamente. Los datos deben ser ingresados y mantenidos de manera segura y confidencial."},{"id":"RS-P153-001","p":153,"est":"Para revisión","area":"Supervisión y Administración","hall":"No hay evidencia de revisiones ni propuestas de actualización porque el sistema no está implementado.","req":"Tras la implementación inicial del EIS, la PRP puede proponer añadir, eliminar o modificar tablas y campos de datos, documentos adjuntos y reportes estandarizados, sometiendo todas las propuestas para revisión y aprobación según el Acuerdo."},{"id":"RS-P136-001","p":136,"est":"Para revisión","area":"Supervisión y Administración","hall":"Los oficiales operacionales de campo no están asignados de manera consistente a un solo supervisor claramente identificado.","req":"Todos los oficiales operacionales de campo deberán estar asignados a un solo supervisor que sea consistente y claramente identificado."},{"id":"RS-P136-002","p":136,"est":"Para revisión","area":"Supervisión y Administración","hall":"Los supervisores no están asignados ni trabajan sustancialmente los mismos días y horas que los oficiales que supervisan, excepto bajo circunstancias excepcionales.","req":"Los supervisores deberán estar asignados y trabajar sustancialmente los mismos días y horas que los oficiales que supervisan, excepto bajo circunstancias excepcionales. (Las ausencias regulares de los supervisores, tales como licencias programadas, no programadas o comparecencias rutinarias, no constituirán incumplimiento con este requisito.)"},{"id":"RS-P136-003","p":136,"est":"Para revisión","area":"Supervisión y Administración","hall":"No se cuenta con reportes digitales certeros sobre la asignación de personal que permitan validar si los supervisores están asignados y trabajan sustancialmente los mismos días y horas que los oficiales que supervisan.","req":"Los supervisores deberán estar asignados y trabajar sustancialmente los mismos días y horas que los oficiales que supervisan, excepto bajo circunstancias excepcionales. (Las ausencias regulares de los supervisores, tales como licencias programadas, no programadas o comparecencias rutinarias, no constituirán incumplimiento con este requisito.)"},{"id":"RS-P136-004","p":136,"est":"Para revisión","area":"Supervisión y Administración","hall":"El dashboard desarrollado para medir la consistencia entre supervisores y oficiales aún no ha sido finalizado, revisado e implementado.","req":"Los supervisores deberán estar asignados y trabajar sustancialmente los mismos días y horas que los oficiales que supervisan, excepto bajo circunstancias excepcionales. (Las ausencias regulares de los supervisores, tales como licencias programadas, no programadas o comparecencias rutinarias, no constituirán incumplimiento con este requisito.)"},{"id":"RS-P137-001","p":137,"est":"Para revisión","area":"Supervisión y Administración","hall":"La disponibilidad de los supervisores de campo durante la totalidad de su turno no puede asegurarse de forma consistente.","req":"Los supervisores de campo en servicio deberán mantenerse disponibles durante la totalidad de su turno para responder en el campo y supervisar a los oficiales bajo su comando directo."},{"id":"RS-P138-001","p":138,"est":"Para revisión","area":"Supervisión y Administración","hall":"El programa para garantizar supervisión de campo consistente cuando el supervisor asignado está ausente aún no es plenamente efectivo.","req":"El PRPB deberá desarrollar un programa que garantice supervisión de campo consistente cuando los supervisores asignados estén ausentes o no disponibles durante su turno."},{"id":"RS-P139-001","p":139,"est":"Para revisión","area":"Supervisión y Administración","hall":"La supervisión cercana y efectiva por parte de los comandantes de cuartel y de unidad no se demuestra de forma completa y sistemática","req":"Los comandantes de precintos y unidades  deberán supervisar de forma cercana y efectiva a todos los oficiales bajo su mando."},{"id":"RS-P140-001","p":140,"est":"Para revisión","area":"Supervisión y Administración","hall":"Este hallazgo se encuentra aún en análisis para obtener información adicional que permita evaluar con mayor precisión el cumplimiento de este requisito.","req":"Todos los comandantes y supervisores del PRPB deberán asegurar que los supervisores y los oficiales bajo su mando cumplan con las políticas del PRPB, las leyes del Estado Libre Asociado de Puerto Rico, las leyes federales y los requisitos del Acuerdo."},{"id":"RS-P145-002","p":145,"est":"Para revisión","area":"Supervisión y Administración","hall":"La Orden General de evaluaciones de desempeño no contempla la participación de múltiples supervisores en los casos en que un oficial trabaja bajo distintos supervisores por la naturaleza de los turnos rotativos.","req":"Desarrollar e implementar un sistema específico para evaluar con precisión calificaciones y desempeño de todos los oficiales (policía constitucional, integridad, policía comunitaria, funciones críticas) de forma continua y anual."}],"t":[{"id":"RS-P200-001-T001","h":"RS-P200-001","p":200,"tarea":"Revisar y actualizar el Reglamento 6403 – Reglamento sobre Detección de Sustancias Controladas en la Policía de Puerto Rico.","est":"En progreso","unid":"OFICINA DE REFORMA","fecha":"6/30/2026"},{"id":"RS-P200-002-T001","h":"RS-P200-002","p":200,"tarea":"Implementación de Adiestramiento – Curso VCASE-5061 (componente relacionado con el Programa de Detección de Sustancias Controladas)","est":"En progreso","unid":"DECANATO ASUNTOS ACADEMICOS","fecha":"3/31/2026"},{"id":"RS-P200-003-T001","h":"RS-P200-003","p":200,"tarea":"Definir la metodología de selección aleatoria para su incorporación al Reglamento 6403","est":"En progreso","unid":"DIVISION INVESTIGACIONES ADMINISTRATIVAS","fecha":"3/27/2026"},{"id":"RS-P200-004-T001","h":"RS-P200-004","p":200,"tarea":"Definir el mecanismo para asegurar que todos los miembros de la PPR pasen por la prueba de dopaje, conforme a las limitaciones presupuestarias y operacionales.","est":"En progreso","unid":"NEGOCIADO INVESTIGACIONES ADMINISTRATIVAS","fecha":"3/27/2026"},{"id":"RS-P200-006-T001","h":"RS-P200-006","p":200,"tarea":"Revisión del alcance del párrafo 200 en relación con las pruebas de detección de esteroides.",         );

        const ClockIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const XIcon = () => (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        const DashboardReformStat = () => {
            const [data] = useState(window.REFORMSTAT_DATA);
            const [selectedParrafo, setSelectedParrafo] = useState(null);
            const [selectedHallazgo, setSelectedHallazgo] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterEstatus, setFilterEstatus] = useState('all');
            const [expandedTargets, setExpandedTargets] = useState({});

            const getHallazgosPorParrafo = (numeroParrafo) => {
                return data.h.filter(h => h.p === numeroParrafo);
            };

            const getTareasPorHallazgo = (numeroHallazgo) => {
                return data.t.filter(t => t.h === numeroHallazgo);
            };

            const getEstatusColor = (estatus) => {
                if (!estatus) return 'bg-gray-100 text-gray-600';
                const estatusLower = estatus.toLowerCase();
                if (estatusLower.includes('met') || estatusLower.includes('cumpl') || estatusLower.includes('completad')) return 'bg-emerald-100 text-emerald-700';
                if (estatusLower.includes('missed') || estatusLower.includes('observ')) return 'bg-amber-100 text-amber-700';
                if (estatusLower.includes('progreso') || estatusLower.includes('asignad')) return 'bg-blue-100 text-blue-700';
                return 'bg-gray-100 text-gray-600';
            };

            const getEstatusIcon = (estatus) => {
                if (!estatus) return <ClockIcon />;
                const estatusLower = estatus.toLowerCase();
                if (estatusLower.includes('met') || estatusLower.includes('cumpl') || estatusLower.includes('completad')) return <CheckCircle2Icon />;
                if (estatusLower.includes('missed') || estatusLower.includes('observ')) return <AlertCircleIcon />;
                return <ClockIcon />;
            };

            const filteredParrafos = useMemo(() => {
                return data.p.filter(p => {
                    const matchSearch = searchTerm === '' || 
                        p.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        p.n.toString().includes(searchTerm);
                    
                    if (filterEstatus === 'all') return matchSearch;
                    
                    const hasMatchingTarget = p.t.some(t => {
                        const estatus = t.est?.toLowerCase() || '';
                        if (filterEstatus === 'met') return estatus.includes('met') || estatus.includes('cumpl');
                        if (filterEstatus === 'missed') return estatus.includes('missed') || estatus.includes('observ');
                        return false;
                    });
                    
                    return matchSearch && hasMatchingTarget;
                });
            }, [searchTerm, filterEstatus]);

            const toggleTarget = (parrafoNum, targetNum) => {
                const key = `${parrafoNum}-${targetNum}`;
                setExpandedTargets(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const stats = useMemo(() => ({
                totalParrafos: data.p.length,
                totalHallazgos: data.h.length,
                totalTareas: data.t.length,
                tareasEnProgreso: data.t.filter(t => t.est?.toLowerCase().includes('progreso')).length,
                hallazgosConTareas: new Set(data.t.map(t => t.h)).size
            }), []);

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 text-white shadow-2xl">
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <div className="flex items-start justify-between">
                                <div>
                                    <h1 className="text-5xl font-black tracking-tight mb-2">ReformStat</h1>
                                    <p className="text-blue-200 text-lg font-light tracking-wide">Sistema de Monitoreo de Cumplimiento</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-sm text-blue-200 mb-1">Reporte CMR13</div>
                                    <div className="text-2xl font-bold">{data.p.length} Párrafos</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Stats Bar */}
                    <div className="bg-white border-b-2 border-slate-200 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-6">
                            <div className="grid grid-cols-5 gap-6">
                                <div className="text-center">
                                    <div className="text-3xl font-black text-slate-900">{stats.totalParrafos}</div>
                                    <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Párrafos</div>
                                </div>
                                <div className="text-center border-l-2 border-slate-200">
                                    <div className="text-3xl font-black text-amber-600">{stats.totalHallazgos}</div>
                                    <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Hallazgos</div>
                                </div>
                                <div className="text-center border-l-2 border-slate-200">
                                    <div className="text-3xl font-black text-blue-600">{stats.totalTareas}</div>
                                    <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Tareas</div>
                                </div>
                                <div className="text-center border-l-2 border-slate-200">
                                    <div className="text-3xl font-black text-emerald-600">{stats.tareasEnProgreso}</div>
                                    <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">En Progreso</div>
                                </div>
                                <div className="text-center border-l-2 border-slate-200">
                                    <div className="text-3xl font-black text-purple-600">{stats.hallazgosConTareas}</div>
                                    <div className="text-xs uppercase tracking-wider text-slate-500 font-semibold mt-1">Con Tareas</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Search & Filter */}
                    <div className="max-w-7xl mx-auto px-6 py-6">
                        <div className="bg-white rounded-2xl shadow-lg p-6 border-2 border-slate-200">
                            <div className="flex gap-4 flex-wrap">
                                <div className="flex-1 relative min-w-[300px]">
                                    <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400">
                                        <SearchIcon />
                                    </div>
                                    <input
                                        type="text"
                                        placeholder="Buscar por párrafo o número..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-12 pr-4 py-3 border-2 border-slate-300 rounded-xl focus:border-blue-500 focus:outline-none transition-colors text-slate-900 font-medium"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setFilterEstatus('all')}
                                        className={`px-6 py-3 rounded-xl font-bold transition-all ${
                                            filterEstatus === 'all' 
                                                ? 'bg-slate-900 text-white' 
                                                : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                        }`}
                                    >
                                        Todos
                                    </button>
                                    <button
                                        onClick={() => setFilterEstatus('met')}
                                        className={`px-6 py-3 rounded-xl font-bold transition-all ${
                                            filterEstatus === 'met' 
                                                ? 'bg-emerald-600 text-white' 
                                                : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                        }`}
                                    >
                                        Cumplidos
                                    </button>
                                    <button
                                        onClick={() => setFilterEstatus('missed')}
                                        className={`px-6 py-3 rounded-xl font-bold transition-all ${
                                            filterEstatus === 'missed' 
                                                ? 'bg-amber-600 text-white' 
                                                : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                        }`}
                                    >
                                        Pendientes
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-6 pb-12">
                        <div className="grid grid-cols-12 gap-6">
                            {/* Párrafos List */}
                            <div className="col-span-12 lg:col-span-4 space-y-3">
                                <div className="bg-white rounded-xl shadow-lg p-4 border-2 border-slate-200 sticky top-4">
                                    <h2 className="text-xl font-black text-slate-900 mb-4 flex items-center gap-2">
                                        <FileTextIcon />
                                        <span>Párrafos ({filteredParrafos.length})</span>
                                    </h2>
                                    <div className="space-y-2 max-h-[calc(100vh-250px)] overflow-y-auto">
                                        {filteredParrafos.map(parrafo => {
                                            const hallazgos = getHallazgosPorParrafo(parrafo.n);
                                            const isSelected = selectedParrafo?.n === parrafo.n;
                                            
                                            return (
                                                <button
                                                    key={parrafo.n}
                                                    onClick={() => {
                                                        setSelectedParrafo(parrafo);
                                                        setSelectedHallazgo(null);
                                                    }}
                                                    className={`w-full text-left p-4 rounded-xl border-2 transition-all ${
                                                        isSelected
                                                            ? 'bg-slate-900 text-white border-slate-900 shadow-xl'
                                                            : 'bg-white hover:bg-slate-50 border-slate-200 hover:border-slate-300'
                                                    }`}
                                                >
                                                    <div className="flex items-start justify-between mb-2">
                                                        <div className="font-black text-2xl">#{parrafo.n}</div>
                                                        {hallazgos.length > 0 && (
                                                            <div className="bg-amber-500 text-white text-xs font-bold px-2 py-1 rounded-full">
                                                                {hallazgos.length} hallazgos
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className={`text-sm font-medium line-clamp-2 ${isSelected ? 'text-blue-200' : 'text-slate-600'}`}>
                                                        {parrafo.id.replace(`Paragraph ${parrafo.n}: `, '')}
                                                    </div>
                                                    <div className="flex gap-1 mt-2 flex-wrap">
                                                        {parrafo.t.map(t => (
                                                            <div key={t.num} className={`text-xs px-2 py-1 rounded-full ${isSelected ? 'bg-slate-700 text-white' : getEstatusColor(t.est)}`}>
                                                                T{t.num}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            {/* Detail Panel */}
                            <div className="col-span-12 lg:col-span-8 space-y-4">
                                {!selectedParrafo ? (
                                    <div className="bg-white rounded-2xl shadow-lg p-12 text-center border-2 border-slate-200">
                                        <div className="w-16 h-16 text-slate-300 mx-auto mb-4">
                                            <FileTextIcon />
                                        </div>
                                        <p className="text-slate-400 text-lg font-medium">Selecciona un párrafo para ver detalles</p>
                                    </div>
                                ) : (
                                    <>
                                        {/* Párrafo Details */}
                                        <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl shadow-2xl p-8 text-white border-2 border-slate-700">
                                            <div className="flex items-start justify-between mb-6">
                                                <div>
                                                    <div className="text-sm uppercase tracking-widest text-blue-300 mb-2 font-bold">Párrafo</div>
                                                    <h2 className="text-4xl font-black mb-2">#{selectedParrafo.n}</h2>
                                                    <p className="text-blue-200 text-lg">{selectedParrafo.id.replace(`Paragraph ${selectedParrafo.n}: `, '')}</p>
                                                </div>
                                                <button
                                                    onClick={() => {
                                                        setSelectedParrafo(null);
                                                        setSelectedHallazgo(null);
                                                    }}
                                                    className="text-white hover:bg-slate-700 p-2 rounded-lg transition-colors"
                                                >
                                                    <XIcon />
                                                </button>
                                            </div>

                                            {/* Targets */}
                                            <div className="space-y-3">
                                                {selectedParrafo.t.map(target => {
                                                    const key = `${selectedParrafo.n}-${target.num}`;
                                                    const isExpanded = expandedTargets[key];
                                                    
                                                    return (
                                                        <div key={target.num} className="bg-slate-800/50 rounded-xl border-2 border-slate-700 overflow-hidden">
                                                            <button
                                                                onClick={() => toggleTarget(selectedParrafo.n, target.num)}
                                                                className="w-full p-4 text-left flex items-center justify-between hover:bg-slate-700/50 transition-colors"
                                                            >
                                                                <div className="flex items-center gap-3 flex-1">
                                                                    <div className="flex-shrink-0 w-4 h-4">
                                                                        {getEstatusIcon(target.est)}
                                                                    </div>
                                                                    <div className="flex-1">
                                                                        <div className="font-bold text-sm mb-1">Target {target.num}</div>
                                                                        <div className="text-sm text-blue-200 line-clamp-2">{target.obj}</div>
                                                                    </div>
                                                                </div>
                                                                <div className="flex items-center gap-3 flex-shrink-0">
                                                                    <div className={`px-3 py-1 rounded-full text-xs font-bold ${getEstatusColor(target.est)}`}>
                                                                        {target.est}
                                                                    </div>
                                                                    {isExpanded ? <ChevronDownIcon /> : <ChevronRightIcon />}
                                                                </div>
                                                            </button>
                                                            
                                                            {isExpanded && (
                                                                <div className="p-4 border-t-2 border-slate-700 space-y-4 bg-slate-800/30">
                                                                    {target.ass && (
                                                                        <div>
                                                                            <div className="text-xs uppercase tracking-wider text-blue-300 mb-2 font-bold">Assessment Narrativo</div>
                                                                            <div className="text-sm text-slate-200 leading-relaxed">{target.ass}</div>
                                                                        </div>
                                                                    )}
                                                                    {target.path && (
                                                                        <div>
                                                                            <div className="text-xs uppercase tracking-wider text-emerald-300 mb-2 font-bold">Pathway Forward</div>
                                                                            <div className="text-sm text-slate-200 leading-relaxed">{target.path}</div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {/* Hallazgos Section */}
                                        <div className="bg-white rounded-2xl shadow-lg p-6 border-2 border-slate-200">
                                            <h3 className="text-2xl font-black text-slate-900 mb-4 flex items-center gap-2">
                                                <div className="w-6 h-6 text-amber-600">
                                                    <AlertCircleIcon />
                                                </div>
                                                <span>Hallazgos</span>
                                            </h3>
                                            
                                            {(() => {
                                                const hallazgos = getHallazgosPorParrafo(selectedParrafo.n);
                                                
                                                if (hallazgos.length === 0) {
                                                    return (
                                                        <div className="text-center py-8 text-slate-400">
                                                            <div className="w-12 h-12 mx-auto mb-3 opacity-30">
                                                                <AlertCircleIcon />
                                                            </div>
                                                            <p className="font-medium">No hay hallazgos para este párrafo</p>
                                                        </div>
                                                    );
                                                }
                                                
                                                return (
                                                    <div className="space-y-3">
                                                        {hallazgos.map(hallazgo => {
                                                            const tareas = getTareasPorHallazgo(hallazgo.id);
                                                            const isSelected = selectedHallazgo?.id === hallazgo.id;
                                                            
                                                            return (
                                                                <div key={hallazgo.id} className="border-2 border-slate-200 rounded-xl overflow-hidden">
                                                                    <button
                                                                        onClick={() => setSelectedHallazgo(isSelected ? null : hallazgo)}
                                                                        className={`w-full p-4 text-left transition-all ${
                                                                            isSelected ? 'bg-amber-50' : 'bg-white hover:bg-slate-50'
                                                                        }`}
                                                                    >
                                                                        <div className="flex items-start justify-between">
                                                                            <div className="flex-1">
                                                                                <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                                                    <div className="font-black text-slate-900">{hallazgo.id}</div>
                                                                                    <div className={`px-2 py-1 rounded-full text-xs font-bold ${getEstatusColor(hallazgo.est)}`}>
                                                                                        {hallazgo.est}
                                                                                    </div>
                                                                                    {tareas.length > 0 && (
                                                                                        <div className="bg-blue-500 text-white text-xs font-bold px-2 py-1 rounded-full">
                                                                                            {tareas.length} tareas
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                                <div className="text-sm text-slate-600 font-medium mb-2">{hallazgo.area}</div>
                                                                                {hallazgo.hall && (
                                                                                    <div className="text-sm text-slate-700 line-clamp-3">{hallazgo.hall}</div>
                                                                                )}
                                                                            </div>
                                                                            <div className="w-5 h-5 text-slate-400 flex-shrink-0 ml-2">
                                                                                {isSelected ? <ChevronDownIcon /> : <ChevronRightIcon />}
                                                                            </div>
                                                                        </div>
                                                                    </button>
                                                                    
                                                                    {isSelected && tareas.length > 0 && (
                                                                        <div className="border-t-2 border-slate-200 bg-blue-50 p-4">
                                                                            <h4 className="text-sm font-black text-slate-900 mb-3 uppercase tracking-wider">Tareas Asignadas</h4>
                                                                            <div className="space-y-2">
                                                                                {tareas.map(tarea => (
                                                                                    <div key={tarea.id} className="bg-white rounded-lg p-3 border-2 border-blue-200">
                                                                                        <div className="flex items-start justify-between mb-2 flex-wrap gap-2">
                                                                                            <div className="font-bold text-sm text-slate-900">{tarea.id}</div>
                                                                                            <div className={`px-2 py-1 rounded-full text-xs font-bold ${getEstatusColor(tarea.est)}`}>
                                                                                                {tarea.est}
                                                                                            </div>
                                                                                        </div>
                                                                                        <div className="text-sm text-slate-700 mb-2 font-medium">{tarea.tarea}</div>
                                                                                        {tarea.unid && (
                                                                                            <div className="text-xs text-slate-500">
                                                                                                <span className="font-semibold">Unidad:</span> {tarea.unid}
                                                                                            </div>
                                                                                        )}
                                                                                        {tarea.fecha && (
                                                                                            <div className="text-xs text-slate-500 mt-1">
                                                                                                <span className="font-semibold">Fecha Límite:</span> {tarea.fecha}
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<DashboardReformStat />, document.getElementById('root'));
    </script>
</body>
</html>
